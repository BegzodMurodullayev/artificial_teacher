<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎓 English Grammar Master — 4-Etap</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #111827;
  --bg3: #1a2235;
  --card: #141c2e;
  --border: #1e2d45;
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --green: #10b981;
  --amber: #f59e0b;
  --red: #ef4444;
  --purple: #8b5cf6;
  --pink: #ec4899;
  --cyan: #06b6d4;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Space Grotesk', sans-serif;
  --radius: 12px;
  --radius-sm: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}
/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* HEADER */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,14,26,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
}
.header-logo {
  font-size: 18px; font-weight: 700; color: var(--accent2);
  white-space: nowrap;
}
.search-wrap {
  flex: 1; position: relative;
}
.search-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 8px 16px 8px 40px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}
.search-input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute; left: 13px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3); font-size: 14px; pointer-events: none;
}
.back-btn {
  display: none;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 7px 14px;
  color: var(--text2);
  font-family: var(--sans);
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s;
}
.back-btn:hover { border-color: var(--accent); color: var(--accent2); }

/* VIEWS */
.view { display: none; }
.view.active { display: block; }

/* HOME VIEW */
.hero {
  padding: 32px 16px 20px;
  text-align: center;
}
.hero h1 {
  font-size: clamp(22px, 5vw, 36px);
  font-weight: 700;
  background: linear-gradient(135deg, #60a5fa, #8b5cf6, #ec4899);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.hero p { color: var(--text2); font-size: 14px; }
.stats-row {
  display: flex; gap: 8px; justify-content: center;
  flex-wrap: wrap; margin-top: 16px;
}
.stat-chip {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 4px 14px;
  font-size: 12px; color: var(--text2);
}
.stat-chip span { color: var(--accent2); font-weight: 600; }

/* SECTION GRID */
.sections { padding: 0 12px 24px; }
.section-group { margin-bottom: 20px; }
.section-title {
  font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text3);
  padding: 0 4px; margin-bottom: 10px;
}
.topics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
}
.topic-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.topic-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--c1), var(--c2));
  opacity: 0; transition: opacity .2s;
}
.topic-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.topic-card:hover::before { opacity: 1; }
.topic-card:active { transform: scale(0.98); }
.topic-icon { font-size: 22px; margin-bottom: 8px; }
.topic-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.topic-sub { font-size: 11px; color: var(--text3); }
.topic-badge {
  display: inline-block;
  background: rgba(239,68,68,0.15);
  color: #fca5a5;
  font-size: 9px; font-weight: 600;
  border-radius: 4px; padding: 1px 5px;
  margin-left: 4px; vertical-align: middle;
}

/* DETAIL VIEW */
.detail-header {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border);
}
.detail-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 50px; padding: 4px 12px;
  font-size: 12px; color: var(--text2);
  margin-bottom: 12px;
}
.detail-title {
  font-size: clamp(20px, 4vw, 28px);
  font-weight: 700; margin-bottom: 6px;
}
.detail-desc { font-size: 14px; color: var(--text2); }

.detail-body { padding: 16px; }

/* CONTENT BLOCKS */
.block { margin-bottom: 20px; }

.formula-box {
  background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(139,92,246,0.08));
  border: 1px solid rgba(59,130,246,0.25);
  border-radius: var(--radius);
  padding: 16px;
}
.formula-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--accent);
  margin-bottom: 8px;
}
.formula-text {
  font-family: var(--mono);
  font-size: 15px; font-weight: 600;
  color: #a5f3fc;
}

.keyword-box {
  background: rgba(16,185,129,0.06);
  border: 1px solid rgba(16,185,129,0.2);
  border-radius: var(--radius);
  padding: 14px;
}
.keyword-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--green);
  margin-bottom: 8px;
}
.keyword-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.keyword-tag {
  background: rgba(16,185,129,0.12);
  color: #6ee7b7;
  border-radius: 50px;
  padding: 3px 10px;
  font-size: 12px; font-family: var(--mono); font-weight: 600;
}

.examples-box {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.examples-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--amber);
  margin-bottom: 12px;
}
.example-item {
  display: flex; flex-direction: column; gap: 3px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.example-item:last-child { border-bottom: none; padding-bottom: 0; }
.example-uz { font-size: 13px; color: var(--text2); }
.example-en {
  font-family: var(--mono);
  font-size: 14px; color: #bfdbfe;
  font-weight: 600;
}
.example-en mark {
  background: rgba(245,158,11,0.2);
  color: #fde68a;
  border-radius: 3px; padding: 0 3px;
}

.warning-box {
  background: rgba(239,68,68,0.06);
  border: 1px solid rgba(239,68,68,0.2);
  border-left: 3px solid var(--red);
  border-radius: var(--radius);
  padding: 14px;
}
.warning-box .warn-label {
  font-size: 11px; font-weight: 700; color: #fca5a5;
  margin-bottom: 8px;
}
.wrong { color: #fca5a5; text-decoration: line-through; font-family: var(--mono); font-size: 13px; }
.right { color: #86efac; font-family: var(--mono); font-size: 13px; }

.tip-box {
  background: rgba(139,92,246,0.06);
  border: 1px solid rgba(139,92,246,0.2);
  border-radius: var(--radius);
  padding: 14px;
}
.tip-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--purple);
  margin-bottom: 8px;
}

.diff-box {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}
.diff-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--cyan);
  margin-bottom: 10px;
}
.diff-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-bottom: 6px;
}
.diff-cell {
  background: var(--bg2);
  border-radius: var(--radius-sm);
  padding: 10px;
}
.diff-cell-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.diff-cell-text { font-family: var(--mono); font-size: 12px; color: var(--text); }

/* TABLE */
.grammar-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.grammar-table th {
  background: var(--bg3);
  padding: 10px 12px;
  text-align: left;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
}
.grammar-table td {
  padding: 10px 12px;
  border-bottom: 1px solid rgba(30,45,69,0.5);
  vertical-align: top;
}
.grammar-table tr:last-child td { border-bottom: none; }
.grammar-table tr:hover td { background: rgba(59,130,246,0.04); }
.table-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden; overflow-x: auto;
}

.section-h2 {
  font-size: 15px; font-weight: 700;
  color: var(--text);
  margin: 20px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.section-h3 {
  font-size: 13px; font-weight: 600;
  color: var(--accent2); margin: 14px 0 6px;
}

/* SEARCH RESULTS */
.search-results { padding: 16px; }
.search-results-title { font-size: 13px; color: var(--text2); margin-bottom: 12px; }
.search-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
  margin-bottom: 8px; cursor: pointer; transition: all .2s;
}
.search-item:hover { border-color: var(--accent); }
.search-item-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.search-item-section { font-size: 12px; color: var(--text3); }
.search-item-preview { font-size: 12px; color: var(--text2); margin-top: 4px; }
.no-results { text-align: center; padding: 40px 20px; color: var(--text3); }

/* CHECKLIST */
.checklist { list-style: none; }
.checklist li {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.checklist li:last-child { border-bottom: none; }
.check-icon { color: var(--green); font-size: 16px; flex-shrink: 0; margin-top: 2px; }

/* PILL */
.pill {
  display: inline-block;
  border-radius: 50px; padding: 2px 10px;
  font-size: 11px; font-weight: 600;
}
.pill-blue { background: rgba(59,130,246,0.15); color: #93c5fd; }
.pill-green { background: rgba(16,185,129,0.15); color: #6ee7b7; }
.pill-amber { background: rgba(245,158,11,0.15); color: #fde68a; }
.pill-red { background: rgba(239,68,68,0.15); color: #fca5a5; }
.pill-purple { background: rgba(139,92,246,0.15); color: #c4b5fd; }

/* MOBILE BOTTOM NAV */
.bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(10,14,26,0.97);
  border-top: 1px solid var(--border);
  padding: 8px 0 12px;
  z-index: 100;
}
@media (max-width: 640px) {
  .bottom-nav { display: flex; justify-content: space-around; }
  body { padding-bottom: 70px; }
  .topics-grid { grid-template-columns: repeat(2, 1fr); }
}
.nav-item {
  display: flex; flex-direction: column; align-items: center;
  gap: 3px; cursor: pointer; padding: 4px 12px;
  color: var(--text3); font-size: 10px; transition: color .2s;
}
.nav-item.active { color: var(--accent2); }
.nav-item-icon { font-size: 18px; }

/* ANIMATIONS */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.view.active { animation: fadeIn .2s ease; }

/* Highlight in search */
.hl { background: rgba(245,158,11,0.25); color: #fde68a; border-radius: 2px; padding: 0 2px; }
</style>
</head>

// ============================================================
// RENDER HOME
// ============================================================
function renderHome() {
  const container = document.getElementById('mainSections');
  container.innerHTML = sections.map(sec => `
    <div class="section-group">
      <div class="section-title">${sec.icon} ${sec.title}</div>
      <div class="topics-grid">
        ${sec.topics.map(t => `
          <div class="topic-card" style="--c1:${sec.color[0]};--c2:${sec.color[1]}" onclick="showTopic('${t.id}')">
            <div class="topic-icon">${sec.icon}</div>
            <div class="topic-name">${t.name}${t.badge ? '<span class="topic-badge">HOT</span>' : ''}</div>
            <div class="topic-sub">${t.sub}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ============================================================
// SHOW TOPIC
// ============================================================
function showTopic(id) {
  const data = topicData[id];
  if (!data) return;
  document.getElementById('detailBadge').textContent = data.section;
  document.getElementById('detailTitle').textContent = data.title;
  document.getElementById('detailDesc').textContent = data.desc;
  document.getElementById('detailBody').innerHTML = data.content;
  showView('detailView');
  window.scrollTo(0, 0);
}

// ============================================================
// VIEW MANAGEMENT
// ============================================================
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const showBack = id !== 'homeView';
  document.getElementById('backBtn').style.display = showBack ? 'block' : 'none';
}

function goHome() {
  document.getElementById('searchInput').value = '';
  showView('homeView');
  window.scrollTo(0, 0);
}

function focusSearch() {
  document.getElementById('searchInput').focus();
}

// ============================================================
// SEARCH
// ============================================================
function handleSearch(query) {
  if (!query.trim()) { showView('homeView'); return; }
  showView('searchView');
  document.getElementById('backBtn').style.display = 'block';
  const q = query.toLowerCase();
  const results = [];
  for (const [id, data] of Object.entries(topicData)) {
    const text = (data.title + ' ' + data.desc + ' ' + data.section + ' ' + data.content).toLowerCase();
    if (text.includes(q)) {
      results.push({ id, title: data.title, section: data.section, desc: data.desc });
    }
  }
  const list = document.getElementById('searchResultsList');
  document.getElementById('searchResultsTitle').textContent = `"${query}" uchun ${results.length} natija:`;
  if (results.length === 0) {
    list.innerHTML = '<div class="no-results">🔍 Natija topilmadi. Boshqacha so\'z bilan qidiring.</div>';
  } else {
    list.innerHTML = results.map(r => `
      <div class="search-item" onclick="showTopic('${r.id}')">
        <div class="search-item-section">${r.section}</div>
        <div class="search-item-title">${r.title}</div>
        <div class="search-item-preview">${r.desc}</div>
      </div>
    `).join('');
  }
}

// ============================================================
// CHECKLIST SHORTCUT
// ============================================================
function showChecklist() {
  showTopic('t1001');
}

// ============================================================
// INIT
// ============================================================
renderHome();
