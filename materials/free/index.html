    const DAILY_LIMITS = { checks: 12, quiz: 5 };
    const STORAGE_KEY = "english-mastery-free-state-v1";
    const TELEGRAM = window.Telegram?.WebApp ?? null;
    const TODAY = new Date().toISOString().slice(0, 10);
    const app = document.getElementById("app");
    const levelMap = Object.fromEntries(APP_DATA.levels.map((level) => [level.id, level]));

    let usage = loadUsage();
    let telegramBackHooked = false;
    let state = {
      view: "home",
      levelId: APP_DATA.levels[0].id,
      topicId: null,
      activeTab: "learn",
      quizIndex: 0,
      selectedOption: null,
      answers: [],
      result: null,
      quizFinished: false,
      toast: "",
    };
    const historyStack = [];

    function loadUsage() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.date !== TODAY) {
          return {
            date: TODAY,
            checksUsed: 0,
            quizUsed: 0,
            seenTopics: [],
          };
        }
        return {
          date: TODAY,
          checksUsed: Math.min(saved.checksUsed || 0, DAILY_LIMITS.checks),
          quizUsed: Math.min(saved.quizUsed || 0, DAILY_LIMITS.quiz),
          seenTopics: Array.isArray(saved.seenTopics) ? saved.seenTopics : [],
        };
      } catch (error) {
        return { date: TODAY, checksUsed: 0, quizUsed: 0, seenTopics: [] };
      }
    }

    function saveUsage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(usage));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function currentLevel() {
      return levelMap[state.levelId];
    }

    function currentTopic() {
      return currentLevel().topics.find((topic) => topic.id === state.topicId) || null;
    }

    function cloneState() {
      return JSON.parse(JSON.stringify(state));
    }

    function pushHistory() {
      historyStack.push(cloneState());
    }

    function setState(patch, options = {}) {
      if (options.pushHistory) {
        pushHistory();
      }
      state = { ...state, ...patch };
      render();
    }

    function resetToHome() {
      state = {
        ...state,
        view: "home",
        topicId: null,
        activeTab: "learn",
        quizIndex: 0,
        selectedOption: null,
        answers: [],
        result: null,
        quizFinished: false,
        toast: "",
      };
      render();
    }

    function handleBack() {
      if (historyStack.length) {
        state = historyStack.pop();
        render();
        return;
      }
      resetToHome();
    }

    function markCheck(topicId) {
      if (!usage.seenTopics.includes(topicId)) {
        usage.seenTopics.push(topicId);
        usage.checksUsed = Math.min(DAILY_LIMITS.checks, usage.checksUsed + 1);
        saveUsage();
      }
    }

    function markQuizUsage() {
      usage.quizUsed = Math.min(DAILY_LIMITS.quiz, usage.quizUsed + 1);
      saveUsage();
    }

    function progressPercent(value, total) {
      return Math.max(0, Math.min(100, Math.round((value / total) * 100)));
    }

    function syncTelegram() {
      if (!TELEGRAM) return;
      TELEGRAM.ready();
      TELEGRAM.expand();
      TELEGRAM.setBackgroundColor("#0a0e1a");
      TELEGRAM.setHeaderColor("#0a0e1a");
      if (!telegramBackHooked) {
        TELEGRAM.BackButton.onClick(handleBack);
        telegramBackHooked = true;
      }
      if (state.view === "home") {
        TELEGRAM.BackButton.hide();
      } else {
        TELEGRAM.BackButton.show();
      }
    }

    function telegramUserName() {
      if (!TELEGRAM?.initDataUnsafe?.user) return "Do'stim";
      const user = TELEGRAM.initDataUnsafe.user;
      return user.first_name || user.username || "Do'stim";
    }

    function sendQuizResult(topic, score, total) {
      const payload = {
        type: "quiz_result",
        app: APP_DATA.appName,
        edition: APP_DATA.edition,
        level: state.levelId,
        topicId: topic.id,
        topicTitle: topic.title,
        score,
        total,
        date: TODAY,
        user: TELEGRAM?.initDataUnsafe?.user
          ? {
              id: TELEGRAM.initDataUnsafe.user.id,
              username: TELEGRAM.initDataUnsafe.user.username || null,
              first_name: TELEGRAM.initDataUnsafe.user.first_name || null,
            }
          : null,
      };

      if (TELEGRAM?.sendData) {
        TELEGRAM.sendData(JSON.stringify(payload));
        state.toast = "Natija botga yuborildi.";
      } else {
        state.toast = "Preview rejimi: sendData faqat Telegram ichida ishlaydi.";
      }
    }

    function sendPremiumIntent() {
      const payload = {
        type: "premium_interest",
        app: APP_DATA.appName,
        edition: APP_DATA.edition,
        level: state.levelId,
        topicId: state.topicId,
        date: TODAY,
      };
      if (TELEGRAM?.sendData) {
        TELEGRAM.sendData(JSON.stringify(payload));
        state.toast = "Premium qiziqish signali botga yuborildi.";
      } else {
        state.toast = "Preview rejimi: Premium tugmasi Telegram ichida botga signal yuboradi.";
      }
      render();
    }

    function renderDashboard() {
      const checks = usage.checksUsed;

              <p class="mt-2 text-sm text-muted">${escapeHtml(telegramUserName())}, bugungi bepul limitlaringiz shu yerda boshqariladi.</p>
            </div>
            <div class="rounded-2xl border border-sky-400/20 bg-sky-400/10 px-3 py-2 text-right text-[11px] text-sky-100">

          <div class="mt-4 grid grid-cols-3 gap-2 text-center text-xs">

            </div>
          </div>
        </section>
      `;
    }

    function renderMetricCard(label, value, total, caption) {
      const percent = progressPercent(value, total);
      return `

          <div class="rounded-[24px] border border-amber-300/18 bg-amber-300/10 p-4">
            <div class="text-[10px] font-semibold uppercase tracking-[0.24em] text-amber-100/75">Free Edition CTA</div>
            <p class="mt-2 text-sm leading-6 text-amber-50">${escapeHtml(APP_DATA.premiumDescription)}</p>
            <div class="mt-4 flex gap-3">
              <button data-action="premium" class="flex-1 rounded-[20px] border border-amber-200/20 bg-amber-200/14 px-4 py-3 text-sm font-semibold text-white">${escapeHtml(APP_DATA.premiumLabel)}</button>
              <button data-action="restart-quiz" class="flex-1 rounded-[20px] border border-white/10 bg-white/5 px-4 py-3 text-sm font-medium text-slate-100">Yana ishlash</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderToast() {
      if (!state.toast) return "";
      return `
        <div class="glass-card neon-border rounded-[22px] px-4 py-3 text-sm text-sky-50">
          ${escapeHtml(state.toast)}
        </div>
      `;
    }

    function render() {
      syncTelegram();
      app.innerHTML = `
        <main class="relative z-10 mx-auto flex min-h-screen w-full max-w-[430px] flex-col gap-4 px-4 pb-[calc(var(--safe-bottom)+22px)] pt-[calc(var(--safe-top)+14px)]">
          ${renderDashboard()}
          ${renderLevelSelector()}
          ${state.view === "home" ? renderHome() : renderTopicDetail()}
          ${renderToast()}
        </main>
      `;
    }

    function openTopic(topicId) {
      markCheck(topicId);
      setState(
        {
          view: "topic",
          topicId,
          activeTab: "learn",
          quizIndex: 0,
          selectedOption: null,
          answers: [],
          result: null,
          quizFinished: false,
          toast: "",
        },
        { pushHistory: true }
      );
    }

    function switchTab(tab) {
      if (tab === "learn" && state.topicId) {
        markCheck(state.topicId);
      }
      setState(
        {
          activeTab: tab,
          selectedOption: tab === "quiz" ? state.selectedOption : null,
          toast: "",
        },
        { pushHistory: false }
      );
    }

    function restartQuiz() {
      setState(
        {
          activeTab: "quiz",
          quizIndex: 0,
          selectedOption: null,
          answers: [],
          result: null,
          quizFinished: false,
          toast: "",
        },
        { pushHistory: false }
      );
    }

    function finishQuiz() {
      const topic = currentTopic();
      const review = topic.quiz.map((question, index) => {
        const selectedIndex = state.answers[index];
        return {
          question: question.q,
          selected:
            typeof selectedIndex === "number"
              ? question.options[selectedIndex]
              : "Javob tanlanmagan",
          correct: question.options[question.answer],
          explain: question.explain,
          isCorrect: selectedIndex === question.answer,
        };
      });
      const score = review.filter((item) => item.isCorrect).length;

      markQuizUsage();
      sendQuizResult(topic, score, topic.quiz.length);

      setState(
        {
          quizFinished: true,
          result: {
            score,
            total: topic.quiz.length,
            review,
          },
          selectedOption: null,
        },
        { pushHistory: false }
      );
    }

    app.addEventListener("click", (event) => {
      const target = event.target.closest("[data-action]");
      if (!target) return;
      const action = target.dataset.action;

      if (action === "select-level") {
        const nextLevelId = target.dataset.levelId;
        if (state.view === "topic") {
          historyStack.length = 0;
          state = {
            ...state,
            levelId: nextLevelId,
            view: "home",
            topicId: null,
            activeTab: "learn",
            quizIndex: 0,
            selectedOption: null,
            answers: [],
            result: null,
            quizFinished: false,
            toast: "",
          };
          render();
          return;
        }
        setState({ levelId: nextLevelId, toast: "" }, { pushHistory: false });
        return;
      }

      if (action === "open-topic") {
        openTopic(target.dataset.topicId);
        return;
      }

      if (action === "go-back") {
        handleBack();
        return;
      }

      if (action === "go-home") {
        historyStack.length = 0;
        resetToHome();
        return;
      }

      if (action === "switch-tab") {
        switchTab(target.dataset.tab);
        return;
      }

      if (action === "choose-option") {
        setState({ selectedOption: Number(target.dataset.optionIndex), toast: "" }, { pushHistory: false });
        return;
      }

      if (action === "next-question") {
        if (state.selectedOption === null) return;
        const topic = currentTopic();
        const nextAnswers = [...state.answers];
        nextAnswers[state.quizIndex] = state.selectedOption;

        if (state.quizIndex === topic.quiz.length - 1) {
          state.answers = nextAnswers;
          finishQuiz();
          return;
        }

        setState(
          {
            answers: nextAnswers,
            quizIndex: state.quizIndex + 1,
            selectedOption: null,
            toast: "",
          },
          { pushHistory: false }
        );
        return;
      }

      if (action === "restart-quiz") {
        restartQuiz();
        return;
      }

      if (action === "premium") {
        sendPremiumIntent();
      }
    });

    render();
  </script>
</body>
</html>
