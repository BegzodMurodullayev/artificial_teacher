      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");

      usage[key] = Math.min(max, usage[key] + 1);

    function pct(value, total) {
      return Math.max(0, Math.min(100, Math.round((value / total) * 100)));

    function finishLessonQuiz() {
      const lesson = currentLesson();
      const review = lesson.quiz.map((question, index) => {
        const answerRecord = state.answers[index];
        const isCorrect = question.type === "mcq"
          ? answerRecord === question.answer
          : Array.isArray(answerRecord) && answerRecord.join(" ") === question.answer.join(" ");
        return {
          prompt: question.prompt,
          selected: question.type === "mcq"
            ? (typeof answerRecord === "number" ? question.options[answerRecord] : "Tanlanmagan")
            : (Array.isArray(answerRecord) && answerRecord.length ? answerRecord.join(" ") : "Tuzilmagan"),
          correct: question.type === "mcq" ? question.options[question.answer] : question.answer.join(" "),
          explanation: question.explanation,
          isCorrect,
        };
      });
      const score = review.filter((item) => item.isCorrect).length;
      const mistakes = review.filter((item) => !item.isCorrect);
      increaseUsage("quiz", PRO_ULTIMATE_DB.limits.quiz);
      sendData({
        type: "pro_quiz_result",
        edition: PRO_ULTIMATE_DB.edition,
        level: lesson.levelId,
        lessonId: lesson.id,
        lessonTitle: lesson.title,
        score,
        total: lesson.quiz.length,
        date: TODAY,
      }, "PRO quiz natijasi botga yuborildi.");
      haptic(score >= 15 ? "success" : "impact");
      setState({
        quizFinished: true,
        quizResult: { score, total: lesson.quiz.length, review, mistakes },
        selectedOption: null,
        reorderAnswer: [],
      }, false);
    }

      haptic("impact");
      setState({

        iqResult: null,

      }, false);

    function finishIq() {
      const questions = PRO_ULTIMATE_DB.iqCenter.questions;
      let logicCorrect = 0;
      let logicTotal = 0;
      let lingCorrect = 0;
      let lingTotal = 0;

      questions.forEach((question, index) => {
        const isCorrect = state.iqAnswers[index] === question.answer;
        if (question.category === "logic") {
          logicTotal += 1;
          if (isCorrect) logicCorrect += 1;
        } else {
          lingTotal += 1;
          if (isCorrect) lingCorrect += 1;
        }
      });

      const totalScore = logicCorrect + lingCorrect;
      const total = questions.length;
      const iqIndex = 82 + Math.round((totalScore / total) * 38);
      const result = {
        totalScore,
        total,
        logicCorrect,
        logicTotal,
        lingCorrect,
        lingTotal,
        iqIndex,
      };

      sendData({
        type: "pro_iq_result",
        edition: PRO_ULTIMATE_DB.edition,
        score: totalScore,
        total,
        iqIndex,
        logicCorrect,
        linguisticCorrect: lingCorrect,
        date: TODAY,
      }, "IQ test natijasi botga yuborildi.");
      haptic(totalScore >= 6 ? "success" : "impact");
      setState({ iqFinished: true, iqResult: result }, false);
    }

    function startVoiceSession() {
      if (limitReached("pronunciation", PRO_ULTIMATE_DB.limits.pronunciation, "Talaffuz")) return;
      increaseUsage("pronunciation", PRO_ULTIMATE_DB.limits.pronunciation);
      stopVoiceSession(false);
      haptic("impact");
      voiceTimer = setInterval(() => {
        state.voiceSeconds += 1;
        render();
      }, 1000);
      setState({
        section: "voice",
        voiceRecording: true,
        voiceSeconds: 0,
        voiceResult: null,
        toast: "",
      }, state.section !== "voice");
    }

    function stopVoiceSession(withResult = true) {
      if (voiceTimer) {
        clearInterval(voiceTimer);
        voiceTimer = null;
      }
      if (!state.voiceRecording) return;
      const fluency = 72 + Math.floor(Math.random() * 23);
      const pronunciation = 68 + Math.floor(Math.random() * 27);
      const rhythm = 70 + Math.floor(Math.random() * 24);
      const phrase = PRO_ULTIMATE_DB.voicePhrases[Math.floor(Math.random() * PRO_ULTIMATE_DB.voicePhrases.length)];
      const payload = {
        type: "pro_voice_practice",
        edition: PRO_ULTIMATE_DB.edition,
        fluency,
        pronunciation,
        rhythm,
        seconds: state.voiceSeconds,
        phrase,
        date: TODAY,
      };

      state.voiceRecording = false;
      if (withResult) {
        state.voiceResult = { fluency, pronunciation, rhythm, phrase };
        sendData(payload, "Voice practice natijasi botga yuborildi.");
        haptic("success");
      }
      render();
    }

    function generateAiReply(userText) {
      const lesson = currentLesson();
      const level = currentLevel();
      const lower = userText.toLowerCase();
      const contextualPrompt = lesson?.learn?.contextualPrompts?.[0] || level.proTips[0];

      if (lower.includes("xato") || lower.includes("mistake")) {
        const mistakeHint = state.quizResult?.mistakes?.[0];
        return mistakeHint
          ? `Hozir sizga eng foydali nuqta shu: "${mistakeHint.prompt}" savolida sizning javobingiz "${mistakeHint.selected}" bo'lgan, to'g'ri javob esa "${mistakeHint.correct}". Shu yerda asosiy qoida: ${mistakeHint.explanation}`
          : `Mistake Review hali shakllanmagan. Avval bir quiz tugating, keyin xatolar bo'yicha aniq tahlil bera olaman.`;
      }

      if (lower.includes("tip") || lower.includes("maslahat")) {
        return `Pro tavsiya: ${level.proTips[0]} Yana bitta kuchli fokus: ${level.proTips[1]}`;
      }

      if (lower.includes("audio") || lower.includes("talaffuz") || lower.includes("pronunciation")) {
        return `Talaffuzni kuchaytirish uchun gapni 3 qatlamda ayting: ma'no, stress va rhythm. Hozirgi dars uchun sizga eng foydali script yo'nalishi: "${lesson?.learn?.audioScripts?.[0] || PRO_ULTIMATE_DB.voicePhrases[0]}"`;
      }

      if (lower.includes("quiz") || lower.includes("test")) {
        return `Quiz strategiyasi: avval ma'no blokini aniqlang, keyin formula qidiring. Bu darsdagi eng muhim signal: ${lesson?.learn?.overview || contextualPrompt}`;
      }

      return `Contextual help: siz hozir ${level.title} darajadasiz${lesson ? ` va "${lesson.title}" darsida turibsiz` : ""}. Shu kontekst uchun eng foydali yo'nalish: ${contextualPrompt}. Istasangiz, men sizga mini drill, xato tahlili yoki speaking prompt ham tayyorlayman.`;
    }

      increaseUsage("ai", PRO_ULTIMATE_DB.limits.ai);

              ${level.proTips.map((tip) => `<div class="rounded-[18px] border border-white/8 bg-white/5 px-3 py-3 text-sm leading-6 text-slate-100">${escapeHtml(tip)}</div>`).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function renderReorder(question) {
      const used = state.reorderAnswer;
      const tokens = question.tokens.map((token, index) => {
        const usedCount = used.filter((item) => item === token).length;
        const available = question.tokens.slice(0, index + 1).filter((item) => item === token).length;
        return { token, disabled: usedCount >= available };
      });
      return `
        <div class="space-y-3">
          <div class="rounded-[22px] border border-white/8 bg-slate-950/26 p-3">
            <div class="flex items-center justify-between gap-3">
              <div class="text-xs uppercase tracking-[0.22em] text-cyan-200/70">Javob maydoni</div>
              <div class="flex gap-2">
                <button data-action="remove-token" class="rounded-full border border-white/10 bg-white/5 px-3 py-1.5 text-[11px] text-white">Orqaga</button>
                <button data-action="clear-reorder" class="rounded-full border border-white/10 bg-white/5 px-3 py-1.5 text-[11px] text-white">Tozalash</button>
              </div>
            </div>
            <div class="mt-3 min-h-[56px] rounded-[18px] border border-dashed border-cyan-300/22 bg-cyan-400/6 p-2">
              ${used.length ? used.map((token) => `<span class="mr-2 mb-2 inline-flex rounded-full bg-white/8 px-3 py-2 text-sm text-white">${escapeHtml(token)}</span>`).join("") : `<div class="px-2 py-2 text-sm text-slate-300/70">So'zlarni to'g'ri tartib bilan joylashtiring.</div>`}
            </div>
          </div>
          <div class="rounded-[22px] border border-white/8 bg-white/5 p-3">
            <div class="text-xs uppercase tracking-[0.22em] text-cyan-200/70">Word bank</div>
            <div class="mt-3 flex flex-wrap gap-2">
              ${tokens.map(({ token, disabled }) => `
                <button data-action="add-token" data-disabled="${disabled}" class="rounded-full border border-white/10 bg-white/5 px-3 py-2 text-sm text-white ${disabled ? "opacity-40" : ""}">
                  ${escapeHtml(token)}
                </button>
              `).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function renderQuizTab(lesson) {
      if (!state.quizStarted) {
        return `
          <div class="space-y-3">
            <div class="rounded-[24px] border border-white/8 bg-white/5 p-4">
              <div class="text-[10px] uppercase tracking-[0.24em] text-cyan-200/70">Quiz Engine</div>
              <div class="mt-2 font-display text-2xl text-white">20 savollik murakkab set</div>
              <p class="mt-2 text-sm leading-6 text-slate-300/80">Bu yerda multiple choice va reorder savollari aralash keladi. Test tugagach, natija, grafik progress va Mistake Review paydo bo'ladi.</p>
            </div>
            <button data-action="start-quiz" class="pro-gradient animate-flow w-full rounded-[22px] px-4 py-4 text-sm font-semibold text-white shadow-neon">Quizni boshlash</button>
          </div>
        `;
      }

      if (state.quizFinished && state.quizResult) {
        const result = state.quizResult;
        const accuracy = pct(result.score, result.total);
        const ring = `conic-gradient(#06b6d4 0deg ${Math.round((accuracy / 100) * 360)}deg, rgba(255,255,255,0.08) ${Math.round((accuracy / 100) * 360)}deg 360deg)`;
        return `
          <div class="space-y-3">
            <div class="rounded-[26px] border border-cyan-300/14 bg-cyan-400/8 p-4">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <div class="text-[10px] uppercase tracking-[0.24em] text-cyan-100/75">Quiz Result</div>
                  <div class="mt-2 font-display text-3xl text-white">${result.score}/${result.total}</div>
                  <p class="mt-2 text-sm leading-6 text-slate-100">${accuracy >= 85 ? "Ajoyib. Siz bu blokni pro nazorat bilan ushlab turibsiz." : accuracy >= 65 ? "Yaxshi natija. Endi xatolar ustida ishlash sizni tez ko'taradi." : "Foundation qayta ko'rib chiqilsa, keyingi attempt ancha kuchli bo'ladi."}</p>
                </div>
                <div class="radial-chart h-[96px] w-[96px] rounded-full" style="background:${ring}">
                  <div class="text-center">
                    <div class="font-display text-2xl text-white">${accuracy}%</div>
                    <div class="text-[10px] uppercase tracking-[0.18em] text-slate-300/70">Accuracy</div>
                  </div>
                </div>
              </div>
              <button data-action="restart-quiz" class="mt-4 w-full rounded-[20px] border border-white/10 bg-white/5 px-4 py-3 text-sm font-medium text-white">Yana ishlash</button>
            </div>

            <div class="rounded-[24px] border border-white/8 bg-white/5 p-4">
              <div class="text-[10px] uppercase tracking-[0.24em] text-cyan-200/70">Mistake Review</div>
              <div class="mt-3 space-y-3">
                ${result.mistakes.length
                  ? result.mistakes.map((item, index) => `
                    <div class="rounded-[20px] border border-rose-300/14 bg-rose-400/8 p-3">
                      <div class="text-xs uppercase tracking-[0.22em] text-rose-100/80">Issue ${index + 1}</div>
                      <div class="mt-2 text-sm leading-6 text-white">${escapeHtml(item.prompt)}</div>
                      <div class="mt-2 text-xs text-slate-200/78">Sizning javobingiz: ${escapeHtml(item.selected)}</div>
                      <div class="mt-1 text-xs text-slate-200/78">To'g'ri javob: ${escapeHtml(item.correct)}</div>
                      <div class="mt-2 text-sm leading-6 text-rose-50">${escapeHtml(item.explanation)}</div>
                    </div>
                  `).join("")
                  : `<div class="rounded-[20px] border border-emerald-300/14 bg-emerald-400/8 p-3 text-sm text-emerald-50">Bu attempt’da xato qolmadi. Siz clean run qildingiz.</div>`}
              </div>
            </div>
          </div>
        `;
      }

      const question = currentQuestion();
      const ready = question.type === "mcq" ? state.selectedOption !== null : state.reorderAnswer.length === question.answer.length;
      return `
        <div class="space-y-3">
          <div class="rounded-[24px] border border-white/8 bg-white/5 p-4">
            <div class="flex items-center justify-between gap-3">
              <div>
                <div class="text-[10px] uppercase tracking-[0.24em] text-cyan-200/70">Question ${state.quizIndex + 1}/${lesson.quiz.length}</div>
                <div class="mt-2 text-base leading-7 text-white">${escapeHtml(question.prompt)}</div>
              </div>
              <button data-action="restart-quiz" class="rounded-[18px] border border-white/10 bg-white/5 px-3 py-2 text-xs text-white">Reset</button>
            </div>
            <div class="mt-4 h-2.5 overflow-hidden rounded-full bg-white/8">
              <div class="pro-gradient h-full rounded-full animate-flow" style="width:${pct(state.quizIndex + 1, lesson.quiz.length)}%"></div>
            </div>
          </div>

          ${question.type === "mcq"
            ? `<div class="grid gap-3">
                ${question.options.map((option, index) => `
                  <button data-action="pick-option" data-option-index="${index}" data-selected="${state.selectedOption === index}" class="quiz-option rounded-[22px] border border-white/8 bg-white/5 p-4 text-left text-sm leading-6 text-slate-100 transition hover:border-cyan-300/35 hover:bg-cyan-400/10">
                    <span class="mr-2 inline-flex h-7 w-7 items-center justify-center rounded-full border border-white/10 bg-white/5 text-xs font-semibold text-cyan-100">${String.fromCharCode(65 + index)}</span>
                    ${escapeHtml(option)}
                  </button>
                `).join("")}
              </div>`
            : renderReorder(question)}

          <button data-action="next-question" class="pro-gradient w-full rounded-[22px] px-4 py-4 text-sm font-semibold text-white ${ready ? "" : "opacity-40"}">
            ${state.quizIndex === lesson.quiz.length - 1 ? "Testni yakunlash" : "Keyingi savol"}
          </button>
        </div>
      `;
    }

    function renderIqSection() {
      if (!state.iqStarted) {
        return `
          <section class="glass-card cyber-line rounded-[30px] p-4 shadow-cyber animate-rise">
            <div class="text-[10px] uppercase tracking-[0.30em] text-cyan-200/70">IQ Test Center</div>
            <h3 class="mt-2 font-display text-2xl text-white">Mantiqiy va lingvistik signal</h3>

            <div class="mt-4 grid gap-3">
              <div class="rounded-[24px] border border-white/8 bg-white/5 p-4 text-sm leading-6 text-slate-100">Test 8 savoldan iborat. Har bir savol sizning pattern recognition, register sensitivity va reasoning qobiliyatingizni ko'rsatadi.</div>
              <button data-action="start-iq" class="pro-gradient w-full rounded-[22px] px-4 py-4 text-sm font-semibold text-white shadow-neon">IQ testni boshlash</button>

          </section>
        `;
      }

      if (state.iqFinished && state.iqResult) {
        const r = state.iqResult;
        const totalPct = pct(r.totalScore, r.total);
        const chart = `conic-gradient(#06b6d4 0deg ${Math.round((r.logicCorrect / r.logicTotal) * 180)}deg, #8b5cf6 ${Math.round((r.logicCorrect / r.logicTotal) * 180)}deg ${Math.round(((r.logicCorrect / r.logicTotal) * 180) + ((r.lingCorrect / r.lingTotal) * 180))}deg, rgba(255,255,255,0.08) 0deg 360deg)`;
        return `
          <section class="glass-card cyber-line rounded-[30px] p-4 shadow-cyber animate-rise">
            <div class="text-[10px] uppercase tracking-[0.30em] text-cyan-200/70">IQ Result</div>
            <div class="mt-4 flex items-center justify-between gap-4">
              <div>
                <div class="font-display text-4xl text-white">${r.iqIndex}</div>
                <div class="mt-1 text-sm text-slate-300/76">Estimated Pro Index</div>
                <p class="mt-3 text-sm leading-6 text-slate-100">${r.iqIndex >= 110 ? "Sizning reasoning profilingiz kuchli. Siz nuance va mantiqni birga boshqaryapsiz." : "Potensial kuchli. Mantiqiy struktura va til registrini birga mashq qilsangiz indeks tez o'sadi."}</p>
              </div>
              <div class="radial-chart h-[120px] w-[120px] rounded-full" style="background:${chart}">
                <div class="text-center">
                  <div class="font-display text-2xl text-white">${totalPct}%</div>
                  <div class="text-[10px] uppercase tracking-[0.20em] text-slate-300/70">Total</div>
                </div>
              </div>
            </div>
            <div class="mt-4 grid gap-3">
              <div class="rounded-[22px] border border-cyan-300/12 bg-cyan-400/8 p-3">
                <div class="flex items-center justify-between gap-3">
                  <span class="text-sm text-white">Logical IQ</span>
                  <span class="text-sm text-white">${r.logicCorrect}/${r.logicTotal}</span>
                </div>
                <div class="mt-2 h-2.5 overflow-hidden rounded-full bg-white/8"><div class="h-full rounded-full bg-cyan-400" style="width:${pct(r.logicCorrect, r.logicTotal)}%"></div></div>
              </div>
              <div class="rounded-[22px] border border-violet-300/12 bg-violet-400/8 p-3">
                <div class="flex items-center justify-between gap-3">
                  <span class="text-sm text-white">Linguistic IQ</span>
                  <span class="text-sm text-white">${r.lingCorrect}/${r.lingTotal}</span>
                </div>
                <div class="mt-2 h-2.5 overflow-hidden rounded-full bg-white/8"><div class="h-full rounded-full bg-violet-400" style="width:${pct(r.lingCorrect, r.lingTotal)}%"></div></div>
              </div>
            </div>
            <button data-action="restart-iq" class="mt-4 w-full rounded-[22px] border border-white/10 bg-white/5 px-4 py-4 text-sm font-semibold text-white">IQ testni yana ishlash</button>
          </section>
        `;
      }

      const question = currentIqQuestion();
      return `
        <section class="glass-card cyber-line rounded-[30px] p-4 shadow-cyber animate-rise">
          <div class="flex items-center justify-between gap-3">
            <div>
              <div class="text-[10px] uppercase tracking-[0.30em] text-cyan-200/70">IQ Question ${state.iqIndex + 1}/${PRO_ULTIMATE_DB.iqCenter.questions.length}</div>
              <div class="mt-2 text-base leading-7 text-white">${escapeHtml(question.prompt)}</div>
            </div>
            <div class="rounded-[18px] border border-white/8 bg-white/5 px-3 py-2 text-xs text-white">${escapeHtml(question.category)}</div>
          </div>
          <div class="mt-4 grid gap-3">
            ${question.options.map((option, index) => `
              <button data-action="pick-iq-option" data-option-index="${index}" class="rounded-[22px] border border-white/8 bg-white/5 p-4 text-left text-sm text-slate-100 transition hover:border-cyan-300/35 hover:bg-cyan-400/10">
                <span class="mr-2 inline-flex h-7 w-7 items-center justify-center rounded-full border border-white/10 bg-white/5 text-xs font-semibold text-cyan-100">${String.fromCharCode(65 + index)}</span>
                ${escapeHtml(option)}
              </button>
            `).join("")}
          </div>
          <div class="mt-4 h-2.5 overflow-hidden rounded-full bg-white/8">
            <div class="pro-gradient h-full rounded-full" style="width:${pct(state.iqIndex + 1, PRO_ULTIMATE_DB.iqCenter.questions.length)}%"></div>
          </div>
        </section>
      `;
    }

    function renderVoiceSection() {
      const waveBars = Array.from({ length: 10 }, (_, i) => `
        <div class="wave-bar animate-wave w-2 rounded-full ${state.voiceRecording ? "bg-cyan-400" : "bg-white/18"}" style="height:${24 + (i % 5) * 8}px"></div>
      `).join("");
      return `
        <section class="glass-card cyber-line rounded-[30px] p-4 shadow-cyber animate-rise">
          <div class="text-[10px] uppercase tracking-[0.30em] text-cyan-200/70">Voice Practice UI</div>
          <div class="mt-2 flex items-start justify-between gap-3">
            <div>
              <h3 class="font-display text-2xl text-white">Mic simulation va waveform coach</h3>

              <i class="fa-solid fa-microphone mr-2"></i>Start
            </button>
            <button data-action="voice-stop" class="rounded-[22px] border border-violet-300/16 bg-violet-400/12 px-4 py-4 text-sm font-semibold text-white">

            </button>

          <div class="mt-4 rounded-[22px] border border-white/8 bg-white/5 p-4">

            <div class="mt-2 text-sm leading-6 text-slate-100">${escapeHtml(PRO_ULTIMATE_DB.voicePhrases[state.voiceSeconds % PRO_ULTIMATE_DB.voicePhrases.length])}</div>

          ${state.voiceResult ? `
            <div class="mt-4 rounded-[24px] border border-cyan-300/14 bg-cyan-400/8 p-4">
              <div class="text-[10px] uppercase tracking-[0.24em] text-cyan-100/75">Voice feedback</div>
              <div class="mt-3 grid gap-3">
                ${[
                  ["Fluency", state.voiceResult.fluency, "bg-cyan-400"],
                  ["Pronunciation", state.voiceResult.pronunciation, "bg-violet-400"],
                  ["Rhythm", state.voiceResult.rhythm, "bg-fuchsia-400"],
                ].map(([label, value, color]) => `
                  <div>
                    <div class="flex items-center justify-between gap-3 text-sm text-white"><span>${label}</span><span>${value}%</span></div>
                    <div class="mt-2 h-2.5 overflow-hidden rounded-full bg-white/8"><div class="h-full rounded-full ${color}" style="width:${value}%"></div></div>
                  </div>
                `).join("")}
              </div>
              <div class="mt-4 rounded-[18px] border border-white/8 bg-white/5 px-3 py-3 text-sm leading-6 text-slate-100">${escapeHtml(state.voiceResult.phrase)}</div>
            </div>
          ` : ""}
        </section>
      `;
    }

      const lesson = currentLesson();
      const promptChips = lesson?.learn?.contextualPrompts || currentLevel().proTips;
      return `
        <section class="glass-card cyber-line rounded-[30px] p-4 shadow-cyber animate-rise">
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="text-[10px] uppercase tracking-[0.30em] text-cyan-200/70">Smart AI Tutor</div>
              <h3 class="mt-2 font-display text-2xl text-white">Contextual help panel</h3>
            </div>
            <div class="rounded-[18px] border border-violet-300/14 bg-violet-400/10 px-3 py-2 text-xs text-violet-100">AI budget: ${usage.ai}/${PRO_ULTIMATE_DB.limits.ai}</div>
          </div>

          <div class="chips mt-4 flex gap-2 overflow-x-auto pb-1">

                <div class="text-[10px] uppercase tracking-[0.24em] ${message.role === "user" ? "text-cyan-200/70" : "text-violet-200/70"}">${message.role === "user" ? "You" : "AI Tutor"}</div>

              <button data-action="ai-chip" data-chip="Menga shu lesson uchun mini drill tayyorla" class="flex-1 rounded-[20px] border border-violet-300/16 bg-violet-400/12 px-4 py-3 text-sm font-semibold text-white">Mini drill</button>

    function renderToast() {
      if (!state.toast) return "";
      return `<div class="glass-card cyber-line rounded-[22px] px-4 py-3 text-sm text-white">${escapeHtml(state.toast)}</div>`;
    }

    function renderMainSection() {
      if (state.section === "lesson") return renderLessonView();
      if (state.section === "iq") return renderIqSection();
      if (state.section === "voice") return renderVoiceSection();
      if (state.section === "ai") return renderAiSection();
      return `${renderFeatureHub()}${renderLevelHub()}`;
    }

    function render() {
      syncTelegram();
      app.innerHTML = `
        <main class="relative z-10 mx-auto flex min-h-screen w-full max-w-[440px] flex-col gap-4 px-4 pb-[calc(var(--safe-bottom)+22px)] pt-[calc(var(--safe-top)+14px)]">
          ${renderHeader()}
          ${renderLimits()}
          ${renderMainSection()}
          ${renderToast()}
        </main>
      `;

      const searchInput = document.getElementById("searchInput");
      if (searchInput) {
        searchInput.addEventListener("input", (event) => {
          state.search = event.target.value;
          render();
        });
      }

      const aiInput = document.getElementById("aiInput");
      if (aiInput) {
        aiInput.addEventListener("input", (event) => {
          state.aiDraft = event.target.value;
        });
      }
    }

    app.addEventListener("click", (event) => {
      const target = event.target.closest("[data-action]");
      if (!target) return;
      const action = target.dataset.action;
      haptic("selection");

      if (action === "select-level") {
        const nextLevelId = target.dataset.levelId;
        if (state.section !== "hub") {
          historyStack.length = 0;
          stopVoiceSession(false);
          state = { ...state, levelId: nextLevelId, section: "hub", lessonId: null, search: "", toast: "" };
          render();
          return;
        }
        setState({ levelId: nextLevelId, toast: "" }, false);
        return;
      }

      if (action === "open-lesson") {
        openLesson(target.dataset.lessonId);
        return;
      }

      if (action === "open-section") {
        openSection(target.dataset.section);
        return;
      }

      if (action === "back") {
        handleBack();
        return;
      }

      if (action === "go-hub") {
        historyStack.length = 0;
        stopVoiceSession(false);
        setState({ section: "hub", lessonId: null, lessonTab: "learn", toast: "" }, false);
        return;
      }

      if (action === "switch-tab") {
        setState({ lessonTab: target.dataset.tab, toast: "" }, false);
        return;
      }

      if (action === "download-pdf") {
        state.toast = `${target.dataset.name} uchun vizual placeholder tugmasi bosildi. Keyin bu yerga real yuklab olish linki ulanadi.`;
        render();
        return;
      }

      if (action === "toggle-audio") {
        toggleAudioPanel();
        return;
      }

      if (action === "start-quiz") {
        startLessonQuiz();
        return;
      }

      if (action === "pick-option") {
        setState({ selectedOption: Number(target.dataset.optionIndex), toast: "" }, false);
        return;
      }

      if (action === "add-token") {
        if (target.dataset.disabled === "true") return;
        setState({ reorderAnswer: [...state.reorderAnswer, target.textContent.trim()], toast: "" }, false);
        return;
      }

      if (action === "remove-token") {
        setState({ reorderAnswer: state.reorderAnswer.slice(0, -1), toast: "" }, false);
        return;
      }

      if (action === "clear-reorder") {
        setState({ reorderAnswer: [], toast: "" }, false);
        return;
      }

      if (action === "next-question") {
        const lesson = currentLesson();
        const question = currentQuestion();
        const ready = question.type === "mcq" ? state.selectedOption !== null : state.reorderAnswer.length === question.answer.length;
        if (!ready) return;

        const answerRecord = question.type === "mcq" ? state.selectedOption : [...state.reorderAnswer];
        const nextAnswers = [...state.answers];
        nextAnswers[state.quizIndex] = answerRecord;

        if (state.quizIndex === lesson.quiz.length - 1) {
          state.answers = nextAnswers;
          finishLessonQuiz();
          return;
        }

        setState({
          answers: nextAnswers,
          quizIndex: state.quizIndex + 1,
          selectedOption: null,
          reorderAnswer: [],
          toast: "",
        }, false);
        return;
      }

      if (action === "restart-quiz") {
        setState({
          quizStarted: true,
          quizIndex: 0,
          selectedOption: null,
          reorderAnswer: [],
          answers: [],
          quizFinished: false,
          quizResult: null,
          toast: "",
        }, false);
        return;
      }

      if (action === "start-iq") {
        startIq();
        return;
      }

      if (action === "pick-iq-option") {
        const nextAnswers = [...state.iqAnswers];
        nextAnswers[state.iqIndex] = Number(target.dataset.optionIndex);
        if (state.iqIndex === PRO_ULTIMATE_DB.iqCenter.questions.length - 1) {
          state.iqAnswers = nextAnswers;
          finishIq();
          return;
        }
        setState({ iqAnswers: nextAnswers, iqIndex: state.iqIndex + 1, toast: "" }, false);
        return;
      }

      if (action === "restart-iq") {
        setState({ iqStarted: false, iqIndex: 0, iqAnswers: [], iqFinished: false, iqResult: null, toast: "" }, false);
        return;
      }

      if (action === "voice-start") {
        startVoiceSession();
        return;
      }

      if (action === "voice-stop") {
        stopVoiceSession(true);
        return;
      }

      if (action === "send-ai") {
        sendAiMessage(state.aiDraft);
        return;
      }

      if (action === "ai-chip") {
        sendAiMessage(target.dataset.chip);
      }
    });

    render();
  </script>
</body>
</html>
