      pointer-events: none;

      height: 240px;
      right: -110px;

      border: 1px solid rgba(148, 163, 184, 0.10);

    const STORAGE_KEY = "english-mastery-standard-state-v1";
    const TODAY = new Date().toISOString().slice(0, 10);

    const lessonMap = Object.fromEntries(
      STANDARD_DB.levels.flatMap((level) =>

      )
    );
    const app = document.getElementById("app");

    let telegramBackHooked = false;
    let usage = loadUsage();
    let state = {
      view: "home",
      levelId: STANDARD_DB.levels[0].id,
      lessonId: null,
      activeTab: "learn",
      search: "",
      toast: "",
      audioOpen: false,
      aiNoteOpen: false,
      quizStarted: false,
      quizIndex: 0,
      selectedOption: null,
      reorderAnswer: [],
      answers: [],
      result: null,
      quizFinished: false,
    };
    const historyStack = [];

    function loadUsage() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.date !== TODAY) {
          return {
            date: TODAY,
            checksUsed: 0,
            quizzesUsed: 0,
            aiUsed: 0,
            pronunciationUsed: 0,
          };
        }
        return {
          date: TODAY,
          checksUsed: Math.min(saved.checksUsed || 0, STANDARD_DB.limits.checks),
          quizzesUsed: Math.min(saved.quizzesUsed || 0, STANDARD_DB.limits.quizzes),
          aiUsed: Math.min(saved.aiUsed || 0, STANDARD_DB.limits.aiMessages),
          pronunciationUsed: Math.min(saved.pronunciationUsed || 0, STANDARD_DB.limits.pronunciation),
        };
      } catch (error) {
        return {
          date: TODAY,
          checksUsed: 0,
          quizzesUsed: 0,
          aiUsed: 0,
          pronunciationUsed: 0,
        };
      }
    }

    function saveUsage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(usage));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function getUserName() {
      const user = TELEGRAM?.initDataUnsafe?.user;
      return user?.first_name || user?.username || "Ustoz";
    }

    function currentLesson() {
      return state.lessonId ? lessonMap[state.lessonId] : null;
    }

    function currentQuestion() {
      const lesson = currentLesson();
      return lesson ? lesson.quiz[state.quizIndex] : null;
    }

    function pushHistory() {
      historyStack.push(JSON.parse(JSON.stringify(state)));
    }

    function setState(patch, push = false) {
      if (push) pushHistory();
      state = { ...state, ...patch };
      render();
    }

    function resetToHome() {
      state = {
        ...state,
        view: "home",
        lessonId: null,
        activeTab: "learn",
        toast: "",
        audioOpen: false,
        aiNoteOpen: false,
        quizStarted: false,
        quizIndex: 0,
        selectedOption: null,
        reorderAnswer: [],
        answers: [],
        result: null,
        quizFinished: false,
      };
      render();
    }

    function handleBack() {
      if (historyStack.length) {
        state = historyStack.pop();
        render();
      } else {
        resetToHome();
      }
    }

    function syncTelegram() {
      if (!TELEGRAM) return;
      TELEGRAM.ready();
      TELEGRAM.expand();
      TELEGRAM.setBackgroundColor("#0f172a");
      TELEGRAM.setHeaderColor("#0f172a");
      if (!telegramBackHooked) {
        TELEGRAM.BackButton.onClick(handleBack);
        telegramBackHooked = true;
      }
      if (state.view === "home") {
        TELEGRAM.BackButton.hide();
      } else {
        TELEGRAM.BackButton.show();
      }
    }

    function percent(value, total) {
      return Math.max(0, Math.min(100, Math.round((value / total) * 100)));
    }

    function limited(counterKey, max, label) {
      if (usage[counterKey] >= max) {
        state.toast = `${label} uchun bugungi limit tugagan.`;
        render();
        return true;
      }
      return false;
    }

    function incrementUsage(counterKey, max) {
      usage[counterKey] = Math.min(max, usage[counterKey] + 1);
      saveUsage();
    }

    function sendResultToBot(lesson, score, total) {
      const payload = {
        type: "standard_quiz_result",
        app: STANDARD_DB.appName,
        edition: STANDARD_DB.edition,
        level: lesson.levelId,
        lessonId: lesson.id,
        lessonTitle: lesson.title,
        score,
        total,
        date: TODAY,
        user: TELEGRAM?.initDataUnsafe?.user
          ? {
              id: TELEGRAM.initDataUnsafe.user.id,
              username: TELEGRAM.initDataUnsafe.user.username || null,
              first_name: TELEGRAM.initDataUnsafe.user.first_name || null,
            }
          : null,
      };

      if (TELEGRAM?.sendData) {
        TELEGRAM.sendData(JSON.stringify(payload));
        state.toast = "Natija botga muvaffaqiyatli yuborildi.";
      } else {
        state.toast = "Preview rejimi: sendData Telegram ichida ishlaydi.";
      }
    }

    function openLesson(lessonId) {
      if (limited("checksUsed", STANDARD_DB.limits.checks, "Tekshiruv")) return;
      incrementUsage("checksUsed", STANDARD_DB.limits.checks);
      setState(
        {
          view: "lesson",
          lessonId,
          activeTab: "learn",
          toast: "",
          audioOpen: false,
          aiNoteOpen: false,
          quizStarted: false,
          quizIndex: 0,
          selectedOption: null,
          reorderAnswer: [],
          answers: [],
          result: null,
          quizFinished: false,
        },
        true
      );
    }

    function startQuiz() {
      if (limited("quizzesUsed", STANDARD_DB.limits.quizzes, "Quiz")) return;
      setState(
        {
          quizStarted: true,
          quizIndex: 0,
          selectedOption: null,
          reorderAnswer: [],
          answers: [],
          result: null,
          quizFinished: false,
          toast: "",
        },
        false
      );
    }

    function getFilteredLessons() {
      const search = state.search.trim().toLowerCase();
      const level = levelMap[state.levelId];
      const allLessons = STANDARD_DB.levels.flatMap((item) =>
        item.lessons.map((lesson) => ({ ...lesson, levelId: item.id, levelTitle: item.title }))
      );

      return (search ? allLessons : level.lessons.map((lesson) => ({ ...lesson, levelId: level.id, levelTitle: level.title })))
        .filter((lesson) => {
          if (!search) return true;
          const haystack = [lesson.title, lesson.summary, lesson.levelTitle, ...(lesson.keywords || [])].join(" ").toLowerCase();
          return haystack.includes(search);
        });
    }

    function finishQuiz() {
      const lesson = currentLesson();
      const review = lesson.quiz.map((question, index) => {
        const answerRecord = state.answers[index];
        const isCorrect =
          question.type === "mcq"
            ? answerRecord === question.answer
            : Array.isArray(answerRecord) && answerRecord.join(" ") === question.answer.join(" ");

        return {
          type: question.type,
          prompt: question.prompt,
          selected:
            question.type === "mcq"
              ? (typeof answerRecord === "number" ? question.options[answerRecord] : "Tanlanmagan")
              : (Array.isArray(answerRecord) && answerRecord.length ? answerRecord.join(" ") : "Tuzilmagan"),
          correct: question.type === "mcq" ? question.options[question.answer] : question.answer.join(" "),
          explanation: question.explanation,
          isCorrect,
        };
      });

      const score = review.filter((item) => item.isCorrect).length;
      incrementUsage("quizzesUsed", STANDARD_DB.limits.quizzes);
      sendResultToBot(lesson, score, lesson.quiz.length);

      setState(
        {
          result: { score, total: lesson.quiz.length, review },
          quizFinished: true,
          selectedOption: null,
          reorderAnswer: [],
        },
        false
      );
    }

          </div>

          <div class="rounded-[24px] border border-white/8 bg-white/5 p-4">
            <div class="text-[10px] font-semibold uppercase tracking-[0.24em] text-indigo-200/70">Qisqa jadval</div>
            <div class="mt-3 overflow-hidden rounded-[20px] border border-white/8">
              <div class="grid grid-cols-3 bg-indigo-400/10 text-xs font-semibold text-indigo-100">
                ${lesson.learn.table[0].map((cell) => `<div class="px-3 py-3">${escapeHtml(cell)}</div>`).join("")}
              </div>
              ${lesson.learn.table.slice(1).map((row) => `
                <div class="grid grid-cols-3 border-t border-white/8 text-xs text-slate-200/82">
                  ${row.map((cell) => `<div class="px-3 py-3 leading-5">${escapeHtml(cell)}</div>`).join("")}
                </div>
              `).join("")}
            </div>
          </div>

          <div class="rounded-[24px] border border-white/8 bg-white/5 p-4">
            <div class="flex gap-3">
              <button data-action="toggle-audio" class="flex-1 rounded-[18px] border border-violet-300/18 bg-violet-400/10 px-4 py-3 text-sm font-semibold text-violet-50">🔊 Audio matnlarini ochish</button>
              <button data-action="ai-help" class="flex-1 rounded-[18px] border border-indigo-300/18 bg-indigo-400/10 px-4 py-3 text-sm font-semibold text-white">💬 AI mini izoh</button>
            </div>
            ${state.audioOpen ? `
              <div class="mt-4 rounded-[20px] border border-violet-300/14 bg-violet-400/8 p-3">
                <div class="text-[10px] uppercase tracking-[0.24em] text-violet-100/80">${escapeHtml(lesson.audioTitle)}</div>
                <div class="mt-3 space-y-2">
                  ${lesson.learn.audioExamples.map((item) => `<div class="rounded-2xl border border-white/8 bg-white/5 px-3 py-3 text-sm leading-6 text-slate-100">${escapeHtml(item)}</div>`).join("")}
                </div>
              </div>
            ` : ""}
            ${state.aiNoteOpen ? `
              <div class="mt-4 rounded-[20px] border border-indigo-300/14 bg-indigo-400/10 p-3">
                <div class="text-[10px] uppercase tracking-[0.24em] text-indigo-100/75">AI izoh</div>
                <div class="mt-2 text-sm leading-6 text-indigo-50">${escapeHtml(lesson.aiHint)}</div>
              </div>
            ` : ""}
          </div>
        </div>
      `;
    }

    function renderMcq(question) {
      return `
        <div class="grid gap-3">
          ${question.options
            .map(
              (option, index) => `
                <button
                  data-action="pick-option"
                  data-option-index="${index}"
                  data-selected="${state.selectedOption === index}"
                  class="quiz-option rounded-[22px] border border-white/8 bg-white/5 p-4 text-left text-sm leading-6 text-slate-100 transition hover:border-indigo-300/35 hover:bg-indigo-400/10"
                >
                  <span class="mr-2 inline-flex h-7 w-7 items-center justify-center rounded-full border border-white/10 bg-white/5 text-xs font-semibold text-indigo-100">${String.fromCharCode(65 + index)}</span>
                  ${escapeHtml(option)}
                </button>
              `
            )
            .join("")}
        </div>
      `;
    }

    function renderReorder(question) {
      const usedTokens = state.reorderAnswer;
      const remainingTokens = question.tokens.map((token, index) => {
        const usedCount = usedTokens.filter((item) => item === token).length;
        const totalCount = question.tokens.slice(0, index + 1).filter((item) => item === token).length;
        return { token, disabled: usedCount >= totalCount };
      });

      return `
        <div class="space-y-3">
          <div class="rounded-[22px] border border-white/8 bg-slate-950/24 p-3">
            <div class="flex items-center justify-between gap-3">
              <div class="text-xs uppercase tracking-[0.22em] text-indigo-200/70">Javob maydoni</div>
              <div class="flex gap-2">
                <button data-action="remove-last-token" class="rounded-full border border-white/10 bg-white/5 px-3 py-1.5 text-[11px] text-white">Orqaga</button>
                <button data-action="clear-reorder" class="rounded-full border border-white/10 bg-white/5 px-3 py-1.5 text-[11px] text-white">Tozalash</button>
              </div>
            </div>
            <div class="mt-3 min-h-[54px] rounded-[18px] border border-dashed border-indigo-300/22 bg-indigo-400/6 p-2">
              ${state.reorderAnswer.length
                ? state.reorderAnswer.map((token, index) => `<span class="mr-2 mb-2 inline-flex rounded-full bg-white/8 px-3 py-2 text-sm text-white">${escapeHtml(token)}</span>`).join("")
                : `<div class="px-2 py-2 text-sm text-slate-300/70">So'zlarni bosib to'g'ri tartib bilan joylang.</div>`}
            </div>
          </div>
          <div class="rounded-[22px] border border-white/8 bg-white/5 p-3">
            <div class="text-xs uppercase tracking-[0.22em] text-indigo-200/70">So'zlar banki</div>
            <div class="mt-3 flex flex-wrap gap-2">
              ${remainingTokens
                .map(
                  ({ token, disabled }, index) => `
                    <button
                      data-action="add-token"
                      data-token="${escapeHtml(token)}"
                      data-disabled="${disabled}"
                      class="answer-chip rounded-full border border-white/10 bg-white/5 px-3 py-2 text-sm text-white transition hover:border-indigo-300/30 hover:bg-indigo-400/10"
                    >
                      ${escapeHtml(token)}
                    </button>
                  `
                )
                .join("")}
            </div>
          </div>
        </div>
      `;
    }

    function renderQuizTab(lesson) {
      if (!state.quizStarted) {
        return `
          <div class="space-y-3">
            <div class="rounded-[24px] border border-white/8 bg-white/5 p-4">
              <div class="text-[10px] uppercase tracking-[0.24em] text-indigo-200/70">Bilimni tekshirish</div>
              <div class="mt-3 font-display text-2xl text-white">${lesson.quiz.length} ta savol</div>
              <p class="mt-2 text-sm leading-6 text-slate-300/80">Bu blokda multiple choice va so'zlarni tartib bilan joylash savollari aralash beriladi. Test yakunida ball hisoblanadi va Telegram botga yuboriladi.</p>
            </div>
            <button data-action="start-quiz" class="gradient-accent animate-shimmer w-full rounded-[22px] px-4 py-4 text-sm font-semibold text-white shadow-luxe">Quizni boshlash</button>
          </div>
        `;
      }

      if (state.quizFinished && state.result) {
        const { score, total, review } = state.result;
        return `
          <div class="space-y-3">
            <div class="rounded-[24px] border border-indigo-300/18 bg-indigo-400/10 p-4">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <div class="text-[10px] uppercase tracking-[0.24em] text-indigo-200/70">Natija</div>
                  <div class="mt-2 font-display text-3xl text-white">${score}/${total}</div>
                  <p class="mt-2 text-sm leading-6 text-slate-100">${score >= 8 ? "Ajoyib. Standard darajadagi tayyorgarligingiz kuchli." : score >= 6 ? "Yaxshi natija. Qoidalarni yana bir ko'rib chiqsangiz yanada mustahkamlanadi." : "Asosni qayta ko'rib, keyin testni yana ishlang."}</p>
                </div>
                <button data-action="restart-quiz" class="rounded-[18px] border border-white/10 bg-white/5 px-3 py-2 text-xs text-white">Qayta ishlash</button>
              </div>
              <div class="mt-4 h-2.5 overflow-hidden rounded-full bg-white/8">
                <div class="gradient-accent h-full rounded-full" style="width:${percent(score, total)}%"></div>
              </div>
            </div>
            <div class="rounded-[24px] border border-white/8 bg-white/5 p-4">
              <div class="text-[10px] uppercase tracking-[0.24em] text-indigo-200/70">Savolma-savol sharh</div>
              <div class="mt-3 space-y-3">
                ${review
                  .map(
                    (item, index) => `
                      <div class="rounded-[20px] border ${item.isCorrect ? "border-emerald-300/16 bg-emerald-400/8" : "border-rose-300/16 bg-rose-400/8"} p-3">
                        <div class="flex items-start justify-between gap-3">
                          <div class="text-sm leading-6 text-white">${index + 1}. ${escapeHtml(item.prompt)}</div>
                          <div class="rounded-full px-2.5 py-1 text-[11px] font-semibold ${item.isCorrect ? "bg-emerald-500/16 text-emerald-100" : "bg-rose-500/16 text-rose-100"}">${item.isCorrect ? "To'g'ri" : "Xato"}</div>
                        </div>
                        <div class="mt-2 text-xs text-slate-200/80">Sizning javobingiz: ${escapeHtml(item.selected)}</div>
                        <div class="mt-1 text-xs text-slate-200/80">To'g'ri javob: ${escapeHtml(item.correct)}</div>
                        <div class="mt-2 text-sm leading-6 text-slate-100">${escapeHtml(item.explanation)}</div>
                      </div>
                    `
                  )
                  .join("")}
              </div>
            </div>
          </div>
        `;
      }

      const question = currentQuestion();
      const canNext =
        question.type === "mcq"
          ? state.selectedOption !== null
          : state.reorderAnswer.length === question.answer.length;

      return `
        <div class="space-y-3">
          <div class="rounded-[24px] border border-white/8 bg-white/5 p-4">
            <div class="flex items-center justify-between gap-3">
              <div>
                <div class="text-[10px] uppercase tracking-[0.24em] text-indigo-200/70">Savol ${state.quizIndex + 1}/${lesson.quiz.length}</div>
                <div class="mt-2 text-base leading-7 text-white">${escapeHtml(question.prompt)}</div>
              </div>
              <button data-action="restart-quiz" class="rounded-[18px] border border-white/10 bg-white/5 px-3 py-2 text-xs text-white">Reset</button>
            </div>
            <div class="mt-4 h-2.5 overflow-hidden rounded-full bg-white/8">
              <div class="gradient-accent h-full rounded-full" style="width:${percent(state.quizIndex + 1, lesson.quiz.length)}%"></div>
            </div>
          </div>

          ${question.type === "mcq" ? renderMcq(question) : renderReorder(question)}

          <button data-action="next-question" class="gradient-accent w-full rounded-[22px] px-4 py-4 text-sm font-semibold text-white ${canNext ? "" : "opacity-40"}">
            ${state.quizIndex === lesson.quiz.length - 1 ? "Testni yakunlash" : "Keyingi savol"}
          </button>
        </div>
      `;
    }

    function renderLessonView() {
      const lesson = currentLesson();
      if (!lesson) return "";

      return `
        <section class="glass-panel accent-border rounded-[30px] p-4 shadow-luxe animate-softRise">
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="text-[10px] uppercase tracking-[0.24em] text-indigo-200/70">${escapeHtml(lesson.levelTitle)} lesson</div>
              <h3 class="mt-2 font-display text-2xl leading-tight text-white">${escapeHtml(lesson.title)}</h3>
              <p class="mt-2 text-sm leading-6 text-slate-300/80">${escapeHtml(lesson.summary)}</p>
            </div>
            <div class="flex gap-2">
              <button data-action="go-back" class="rounded-[18px] border border-white/10 bg-white/5 px-3 py-2 text-sm text-white">Back</button>
              <button data-action="go-home" class="rounded-[18px] border border-indigo-300/16 bg-indigo-400/10 px-3 py-2 text-sm text-white">Menyu</button>
            </div>
          </div>

          <div class="mt-4 flex gap-2 rounded-[22px] border border-white/8 bg-white/5 p-1">
            <button data-action="switch-tab" data-tab="learn" class="flex-1 rounded-[18px] px-4 py-3 text-sm font-semibold transition ${state.activeTab === "learn" ? "gradient-accent text-white" : "text-slate-300"}">Darsni o'rganish</button>
            <button data-action="switch-tab" data-tab="quiz" class="flex-1 rounded-[18px] px-4 py-3 text-sm font-semibold transition ${state.activeTab === "quiz" ? "gradient-accent text-white" : "text-slate-300"}">Bilimni tekshirish</button>
          </div>

          <div class="mt-4">
            ${state.activeTab === "learn" ? renderLearnTab(lesson) : renderQuizTab(lesson)}
          </div>
        </section>
      `;
    }

    function renderToast() {
      if (!state.toast) return "";
      return `
        <div class="glass-panel accent-border rounded-[22px] px-4 py-3 text-sm text-white">
          ${escapeHtml(state.toast)}
        </div>
      `;
    }

    function render() {
      syncTelegram();
      app.innerHTML = `
        <main class="relative z-10 mx-auto flex min-h-screen w-full max-w-[440px] flex-col gap-4 px-4 pb-[calc(var(--safe-bottom)+22px)] pt-[calc(var(--safe-top)+14px)]">
          ${renderHeader()}
          ${renderLimitsPanel()}
          ${renderSearchAndLevels()}
          ${state.view === "home" ? renderLessonList() : renderLessonView()}
          ${renderToast()}
        </main>
      `;

      const searchInput = document.getElementById("searchInput");
      if (searchInput) {
        searchInput.addEventListener("input", (event) => {
          state.search = event.target.value;
          render();
        });
      }
    }

    app.addEventListener("click", (event) => {
      const target = event.target.closest("[data-action]");
      if (!target) return;
      const action = target.dataset.action;

      if (action === "select-level") {
        const nextLevelId = target.dataset.levelId;
        if (state.view === "lesson") {
          historyStack.length = 0;
          state = { ...state, levelId: nextLevelId, search: "", lessonId: null, view: "home", toast: "" };
          render();
          return;
        }
        setState({ levelId: nextLevelId, toast: "" }, false);
        return;
      }

      if (action === "open-lesson") {
        openLesson(target.dataset.lessonId);
        return;
      }

      if (action === "go-back") {
        handleBack();
        return;
      }

      if (action === "go-home") {
        historyStack.length = 0;
        resetToHome();
        return;
      }

      if (action === "switch-tab") {
        setState({ activeTab: target.dataset.tab, toast: "" }, false);
        return;
      }

      if (action === "toggle-audio") {
        if (!state.audioOpen) {
          if (limited("pronunciationUsed", STANDARD_DB.limits.pronunciation, "Talaffuz")) return;
          incrementUsage("pronunciationUsed", STANDARD_DB.limits.pronunciation);
        }
        setState({ audioOpen: !state.audioOpen, toast: "" }, false);
        return;
      }

      if (action === "ai-help") {
        if (!state.aiNoteOpen) {
          if (limited("aiUsed", STANDARD_DB.limits.aiMessages, "AI xabar")) return;
          incrementUsage("aiUsed", STANDARD_DB.limits.aiMessages);
        }
        setState({ aiNoteOpen: !state.aiNoteOpen, toast: "" }, false);
        return;
      }

      if (action === "start-quiz") {
        startQuiz();
        return;
      }

      if (action === "pick-option") {
        setState({ selectedOption: Number(target.dataset.optionIndex), toast: "" }, false);
        return;
      }

      if (action === "add-token") {
        if (target.dataset.disabled === "true") return;
        const token = target.textContent.trim();
        setState({ reorderAnswer: [...state.reorderAnswer, token], toast: "" }, false);
        return;
      }

      if (action === "remove-last-token") {
        setState({ reorderAnswer: state.reorderAnswer.slice(0, -1), toast: "" }, false);
        return;
      }

      if (action === "clear-reorder") {
        setState({ reorderAnswer: [], toast: "" }, false);
        return;
      }

      if (action === "restart-quiz") {
        setState(
          {
            quizStarted: true,
            quizIndex: 0,
            selectedOption: null,
            reorderAnswer: [],
            answers: [],
            result: null,
            quizFinished: false,
            toast: "",
          },
          false
        );
        return;
      }

      if (action === "next-question") {
        const lesson = currentLesson();
        const question = currentQuestion();
        const answerRecord =
          question.type === "mcq"
            ? state.selectedOption
            : state.reorderAnswer.slice();

        const ready =
          question.type === "mcq"
            ? state.selectedOption !== null
            : state.reorderAnswer.length === question.answer.length;

        if (!ready) return;

        const nextAnswers = [...state.answers];
        nextAnswers[state.quizIndex] = answerRecord;

        if (state.quizIndex === lesson.quiz.length - 1) {
          state.answers = nextAnswers;
          finishQuiz();
          return;
        }

        setState(
          {
            answers: nextAnswers,
            quizIndex: state.quizIndex + 1,
            selectedOption: null,
            reorderAnswer: [],
            toast: "",
          },
          false
        );
      }
    });

    render();
  </script>
</body>
</html>
