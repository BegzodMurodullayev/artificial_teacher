    function loadProgress() {
      try {
        const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!raw) {
          return {
            lastDate: TODAY,
            streak: 1,
            lessonCompletions: 0,
            examAttempts: 0,
            aiSessions: 0,
            totalExamScore: 0,
            totalExamQuestions: 0,
            masteryBoost: 0,
          };
        }
        if (raw.lastDate !== TODAY) {
          const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
          const streak = raw.lastDate === yesterday ? (raw.streak || 1) + 1 : 1;
          return { ...raw, lastDate: TODAY, streak };
        }
        return raw;
      } catch (error) {
        return {
          lastDate: TODAY,
          streak: 1,
          lessonCompletions: 0,
          examAttempts: 0,
          aiSessions: 0,
          totalExamScore: 0,
          totalExamQuestions: 0,
          masteryBoost: 0,
        };
      }
    }

    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function hapticImpact(style = "light") {
      try {
        HAPTIC?.impactOccurred?.(style);
      } catch (error) {
      }
    }

    function sendToBot(payload, successMessage) {
      if (TELEGRAM?.sendData) {
        TELEGRAM.sendData(JSON.stringify(payload));
        state.toast = successMessage;
      } else {
        state.toast = "Preview rejimi: Telegram botga yuborish funksiyasi WebApp ichida faol bo'ladi.";
      }
    }

    function syncTelegram() {
      if (!TELEGRAM) return;
      TELEGRAM.ready();
      TELEGRAM.expand();
      TELEGRAM.setBackgroundColor("#050505");
      TELEGRAM.setHeaderColor("#050505");
      if (!telegramBackHooked) {
        TELEGRAM.BackButton.onClick(handleBack);
        telegramBackHooked = true;
      }
      const shouldShow = state.section !== "hub" || state.selectedLessonId;
      if (shouldShow) TELEGRAM.BackButton.show();
      else TELEGRAM.BackButton.hide();
    }

    function getUserName() {
      const user = TELEGRAM?.initDataUnsafe?.user;
      return user?.first_name || user?.username || "Hurmatli foydalanuvchi";

    function setState(patch) {
      state = { ...state, ...patch };

    function handleBack() {
      if (state.selectedLessonId) {
        closeLessonDetail();

      if (state.section !== "hub") {
        setState({ section: "hub", toast: "" });
      }

      return state.selectedLessonId ? lessonMap[state.selectedLessonId] : null;

    function closeLessonDetail() {
      resetLessonQuiz();

        selectedLessonId: null,
        lessonTab: "learn",
        toast: "",

    function recordProgress(update) {
      state.progress = {
        ...state.progress,
        ...update,
        lastDate: TODAY,
      };
      saveProgress();

    function openLesson(id) {
      resetLessonQuiz();
      setState({
        selectedLessonId: id,
        lessonTab: "learn",
        toast: "",
      });

    function finishLessonQuiz() {
      const lesson = currentLesson();
      const review = lesson.quiz.map((question, index) => {
        const answer = state.lessonAnswers[index];
        const isCorrect = question.type === "mcq"
          ? answer === question.answer
          : Array.isArray(answer) && answer.join(" ") === question.answer.join(" ");
        return {
          prompt: question.prompt,
          selected: question.type === "mcq"
            ? (typeof answer === "number" ? question.options[answer] : "Tanlanmagan")
            : (Array.isArray(answer) && answer.length ? answer.join(" ") : "Tuzilmagan"),
          correct: question.type === "mcq" ? question.options[question.answer] : question.answer.join(" "),
          explanation: question.explanation,
          isCorrect,
        };
      });
      const score = review.filter((item) => item.isCorrect).length;
      const result = {
        score,
        total: lesson.quiz.length,
        review,
        mistakes: review.filter((item) => !item.isCorrect),
      };
      const masteryAdd = Math.max(1, Math.round((score / lesson.quiz.length) * 3));
      recordProgress({
        lessonCompletions: state.progress.lessonCompletions + 1,
        masteryBoost: state.progress.masteryBoost + masteryAdd,
      });
      sendToBot(
        {
          type: "premium_lesson_quiz",
          edition: CROWN_DATABASE.edition,
          level: lesson.levelId,
          lessonId: lesson.id,
          lessonTitle: lesson.title,
          score,
          total: lesson.quiz.length,
          date: TODAY,
        },
        "Lesson quiz natijasi botga yuborildi."
      );
      setState({
        lessonQuizFinished: true,
        lessonQuizResult: result,
        lessonSelectedOption: null,
        lessonReorderAnswer: [],
      });
    }

    function finishExamReading() {
      const reading = currentExamTrackData().reading;
      const review = reading.questions.map((question, idx) => ({
        prompt: question.prompt,
        selected: typeof state.examAnswers[idx] === "number" ? question.options[state.examAnswers[idx]] : "Tanlanmagan",
        correct: question.options[question.answer],
        explanation: question.explanation,
        isCorrect: state.examAnswers[idx] === question.answer,
      }));
      const score = review.filter((item) => item.isCorrect).length;
      const result = {
        score,
        total: reading.questions.length,
        review,
      };
      recordProgress({
        examAttempts: state.progress.examAttempts + 1,
        totalExamScore: state.progress.totalExamScore + score,
        totalExamQuestions: state.progress.totalExamQuestions + reading.questions.length,
        masteryBoost: state.progress.masteryBoost + Math.max(1, Math.round((score / reading.questions.length) * 2)),
      });
      sendToBot(
        {
          type: "premium_exam_reading",
          track: state.examTrack,
          score,
          total: reading.questions.length,
          date: TODAY,
        },
        "Exam Reading natijasi botga yuborildi."
      );
      setState({
        examFinished: true,
        examResult: result,
      });
    }

    function getFilteredLessons() {
      const query = state.search.trim().toLowerCase();
      if (!query) {
        return currentLevel().lessons.map((lesson) => ({ ...lesson, levelId: currentLevel().id, levelTitle: currentLevel().title }));
      }
      return allLessons.filter((lesson) => {
        const level = levelMap[lesson.levelId];
        const grammarText = level.grammar.map((item) => `${item.topic} ${item.note}`).join(" ");
        const vocabText = level.vocabulary.flatMap((item) => [item.domain, ...item.words]).join(" ");
        const full = `${lesson.title} ${lesson.summary} ${lesson.levelTitle} ${grammarText} ${vocabText}`.toLowerCase();
        return full.includes(query);
      });
    }

    function createAIReply(userText) {
      const text = userText.toLowerCase();
      const level = currentLevel();
      const lesson = currentLesson();
      const quizMistake = state.lessonQuizResult?.mistakes?.[0];

      if (text.includes("xato") || text.includes("mistake")) {
        if (quizMistake) {
          return `Sizning oxirgi xatongiz: "${quizMistake.prompt}". Siz "${quizMistake.selected}" ni tanlagansiz, to'g'ri javob esa "${quizMistake.correct}". Nega? ${quizMistake.explanation} Shu qoida bo'yicha 5 daqiqalik drill boshlaymizmi?`;
        }
        return "Hozircha mistake review uchun yakunlangan quiz ma'lumoti yo'q. Avval bir lesson quizni yakunlasangiz, xatolaringiz bo'yicha aniq strategiya beraman.";
      }

      if (text.includes("ielts") || text.includes("exam")) {
        return "IELTS/CEFR simulyatsiya uchun premium yondashuv: 1) readingda signal so'zlarni belgilang, 2) writingda ikki qatlamli tezis yozing, 3) speakingda point-reason-example formatini saqlang. Xohlasangiz hozir sizga Writing Task 2 skeleton beraman.";
      }

      if (text.includes("grammar") || text.includes("grammatika")) {
        const tip = level.grammar[0];
        return `${level.id} daraja uchun hozir eng foydali grammatika fokus: "${tip.topic}" (${tip.formula}). Amaliy tavsiya: har kuni 8 ta mikro gap yozing va ovoz chiqarib tekshiring.`;
      }

      if (text.includes("vocab") || text.includes("lug")) {
        const vocab = level.vocabulary[0];
        return `${level.id} darajada ${vocab.domain} bo'limidan boshlang: ${vocab.words.slice(0, 4).join(", ")}. Strategiya: har so'z bilan bittadan gap + bitta savol tuzing.`;
      }

      if (text.includes("plan") || text.includes("reja")) {
        return "Premium 7 kunlik mini-reja: 1-kun grammar core, 2-kun vocab sprint, 3-kun reading sim, 4-kun speaking drill, 5-kun writing frame, 6-kun full quiz review, 7-kun weak-zone repair. Agar xohlasangiz buni sizning darajangizga moslab individual qilaman.";
      }

      if (lesson) {
        return `Siz hozir "${lesson.title}" darsidasiz. Shu blokda eng kuchli natija uchun: maqsadni o'qish -> 3 ta principle'dan bittasini amalda qo'llash -> 10 savollik quiz. Men har bosqichda siz bilanman.`;
      }

      return `Rahmat. Siz ${level.id} (${level.title}) kontekstidasiz. Hurmat bilan tavsiya: bugun bittadan grammar, vocab va exam reading mashqini yakunlang. Bu kombinatsiya progresni tezlashtiradi.`;
    }

    function sendAICoachMessage(text) {
      const trimmed = text.trim();
      if (!trimmed) return;
      const reply = createAIReply(trimmed);
      const nextMessages = [
        ...state.aiMessages,
        { role: "user", text: trimmed },
        { role: "assistant", text: reply },
      ];
      recordProgress({ aiSessions: state.progress.aiSessions + 1 });
      setState({
        aiMessages: nextMessages,
        aiDraft: "",
        toast: "",
      });
    }

    function computeMastery() {
      const base = CROWN_DATABASE.progressBlueprint.baseMastery;
      const plus = state.progress.masteryBoost;
      const avgExam = state.progress.totalExamQuestions
        ? Math.round((state.progress.totalExamScore / state.progress.totalExamQuestions) * 100)
        : 0;
      return Math.max(45, Math.min(99, base + plus + Math.round(avgExam * 0.06)));
    }

            <div class="mt-3 min-h-[52px] rounded-[16px] border border-dashed border-amber-300/24 bg-amber-200/6 p-2">

            <div class="text-xs uppercase tracking-[0.22em] text-amber-100/72">Word bank</div>
            <div class="mt-3 flex flex-wrap gap-2">
              ${tokens.map(({ token, disabled }) => `
                <button data-action="add-${type}-token" data-token="${escapeHtml(token)}" data-disabled="${disabled}" class="rounded-full border border-white/10 bg-white/5 px-3 py-2 text-sm text-white ${disabled ? "opacity-40" : ""}">
                  ${escapeHtml(token)}

              `).join("")}
            </div>
          </div>
        </div>
      `;
    }

                      <div class="mt-2 text-xs text-slate-300/76">${escapeHtml(lesson.summary)}</div>
                    </div>
                    <div class="rounded-full border border-amber-300/20 bg-amber-200/10 px-2 py-1 text-[10px] text-amber-100">Open</div>
                  </div>
                </button>
              `).join("")}
            </div>
          </div>
        </section>
        ${state.selectedLessonId ? renderLessonDetail() : ""}
      `;
    }

    function renderExamReading() {
      const reading = currentExamTrackData().reading;
      if (state.examFinished && state.examResult) {
        const result = state.examResult;
        const acc = Math.round((result.score / result.total) * 100);
        return `
          <div class="space-y-3">
            <div class="rounded-[22px] border border-amber-300/14 bg-amber-200/10 p-4">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <div class="text-[10px] uppercase tracking-[0.24em] text-amber-100/72">Reading Result</div>
                  <div class="mt-2 font-display text-3xl text-white">${result.score}/${result.total}</div>
                  <div class="mt-2 text-sm text-slate-100">${acc >= 80 ? "Excellent. Siz matn signalini kuchli ushlab turibsiz." : "Yaxshi. Endi passage signal so'zlariga ko'proq e'tibor qarating."}</div>
                </div>
                <div class="h-[78px] w-[78px] rounded-full border border-amber-300/30 grid place-items-center" style="background: conic-gradient(#d4af37 ${Math.round((acc / 100) * 360)}deg, rgba(255,255,255,0.08) 0deg);">
                  <div class="h-[54px] w-[54px] rounded-full bg-[#0d0d0d] grid place-items-center text-xs text-white">${acc}%</div>
                </div>
              </div>
              <button data-action="restart-exam-reading" class="mt-4 w-full rounded-[18px] border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Readingni qayta ishlash</button>
            </div>
            <div class="rounded-[22px] border border-white/8 bg-white/5 p-4">
              <div class="text-[10px] uppercase tracking-[0.24em] text-amber-100/72">Sharh</div>
              <div class="mt-3 space-y-3">
                ${result.review.map((item, idx) => `
                  <div class="rounded-[16px] border ${item.isCorrect ? "border-emerald-300/16 bg-emerald-400/8" : "border-rose-300/16 bg-rose-400/8"} p-3">
                    <div class="text-xs text-white">${idx + 1}. ${escapeHtml(item.prompt)}</div>
                    <div class="mt-1 text-xs text-slate-200/78">Siz: ${escapeHtml(item.selected)}</div>
                    <div class="mt-1 text-xs text-slate-200/78">To'g'ri: ${escapeHtml(item.correct)}</div>
                    <div class="mt-2 text-xs text-slate-100">${escapeHtml(item.explanation)}</div>
                  </div>
                `).join("")}
              </div>
            </div>
          </div>
        `;
      }

      const question = currentExamQuestion();
      return `
        <div class="space-y-3">
          <div class="rounded-[22px] border border-amber-300/14 bg-white/5 p-4">
            <div class="text-[10px] uppercase tracking-[0.24em] text-amber-100/72">${escapeHtml(reading.title)}</div>
            <p class="mt-2 text-sm leading-6 text-slate-100">${escapeHtml(reading.passage)}</p>
          </div>

          <div class="rounded-[22px] border border-white/8 bg-[#101010] p-4">
            <div class="flex items-center justify-between gap-3">
              <div class="text-sm text-white">Savol ${state.examIndex + 1}/${reading.questions.length}</div>
              <div class="text-xs text-amber-100/75">${state.examTrack.toUpperCase()}</div>
            </div>
            <div class="mt-2 text-sm leading-6 text-white">${escapeHtml(question.prompt)}</div>
            <div class="mt-3 grid gap-2">
              ${question.options.map((option, idx) => `
                <button data-action="pick-exam-option" data-option-index="${idx}" class="rounded-[16px] border border-white/8 bg-white/5 px-3 py-3 text-left text-sm text-white">
                  <span class="mr-2 text-amber-100">${String.fromCharCode(65 + idx)}.</span>${escapeHtml(option)}
                </button>
              `).join("")}
            </div>
            <div class="mt-3 h-2.5 overflow-hidden rounded-full bg-white/8">
              <div class="spark-bar animate-flowBar h-full rounded-full" style="width:${Math.round(((state.examIndex + 1) / reading.questions.length) * 100)}%"></div>
            </div>
          </div>
        </div>
      `;
    }

    function renderExamWriting() {
      const writing = currentExamTrackData().writing;
      return `
        <div class="space-y-3">
          <div class="rounded-[22px] border border-amber-300/14 bg-white/5 p-4">
            <div class="text-[10px] uppercase tracking-[0.24em] text-amber-100/72">Writing Simulation</div>
            <div class="mt-3 space-y-3">
              ${writing.tasks.map((task, idx) => `
                <div class="rounded-[16px] border border-white/8 bg-[#101010] px-3 py-3 text-sm text-white">
                  <div class="text-[10px] uppercase tracking-[0.22em] text-amber-100/72">Task ${idx + 1}</div>
                  <div class="mt-2 leading-6">${escapeHtml(task)}</div>
                </div>
              `).join("")}
            </div>
          </div>
          <div class="rounded-[22px] border border-white/8 bg-white/5 p-4">
            <div class="text-[10px] uppercase tracking-[0.24em] text-amber-100/72">Band guidance</div>
            <div class="mt-2 grid gap-2">
              ${writing.bandHints.map((hint) => `<div class="rounded-[14px] border border-amber-300/14 bg-amber-200/8 px-3 py-2 text-sm text-slate-100">${escapeHtml(hint)}</div>`).join("")}
            </div>
            <button data-action="submit-writing-practice" class="mt-4 w-full rounded-[18px] shimmer-gold animate-shimmer px-4 py-3 text-sm font-semibold text-black">Writing mashqini yakunlangan deb belgilash</button>
          </div>
        </div>
      `;
    }

    function renderExamSpeaking() {
      const speaking = currentExamTrackData().speaking;
      return `
        <div class="space-y-3">
          <div class="rounded-[22px] border border-amber-300/14 bg-white/5 p-4">
            <div class="text-[10px] uppercase tracking-[0.24em] text-amber-100/72">Speaking Topics</div>
            <div class="mt-3 grid gap-2">
              ${speaking.topics.map((topic, idx) => `<div class="rounded-[14px] border border-white/8 bg-[#101010] px-3 py-3 text-sm text-white">${idx + 1}. ${escapeHtml(topic)}</div>`).join("")}
            </div>
          </div>
          <div class="rounded-[22px] border border-white/8 bg-white/5 p-4">
            <div class="text-[10px] uppercase tracking-[0.24em] text-amber-100/72">Elite speaking tips</div>
            <div class="mt-2 grid gap-2">
              ${speaking.eliteTips.map((tip) => `<div class="rounded-[14px] border border-amber-300/14 bg-amber-200/8 px-3 py-2 text-sm text-slate-100">${escapeHtml(tip)}</div>`).join("")}
            </div>
            <button data-action="submit-speaking-practice" class="mt-4 w-full rounded-[18px] shimmer-gold animate-shimmer px-4 py-3 text-sm font-semibold text-black">Speaking mashqini yakunlangan deb belgilash</button>
          </div>
        </div>
      `;
    }

    function renderExamCenter() {
      const track = currentExamTrackData();
      return `
        <section class="royal-card rounded-[30px] p-4 shadow-royal view-fast">
          <div class="text-[10px] uppercase tracking-[0.30em] text-amber-100/70">Exam Simulation Center</div>
          <h3 class="mt-2 font-display text-2xl text-white">IELTS va CEFR to'liq simulyatsiya</h3>
          <p class="mt-2 text-sm leading-6 text-slate-300/78">Reading, writing va speaking bo'limlari bo'yicha premium sinovlar bilan real imtihon rejimiga tayyorlaning.</p>

          <div class="mt-4 flex gap-2 rounded-[20px] border border-white/8 bg-white/5 p-1">
            <button data-action="switch-exam-track" data-track="ielts" class="flex-1 rounded-[14px] px-3 py-2 text-sm ${state.examTrack === "ielts" ? "shimmer-gold animate-shimmer text-black" : "text-slate-200"}">IELTS</button>
            <button data-action="switch-exam-track" data-track="cefr" class="flex-1 rounded-[14px] px-3 py-2 text-sm ${state.examTrack === "cefr" ? "shimmer-gold animate-shimmer text-black" : "text-slate-200"}">CEFR</button>
          </div>

          <div class="mt-3 flex gap-2 rounded-[20px] border border-white/8 bg-white/5 p-1">
            <button data-action="switch-exam-part" data-part="reading" class="flex-1 rounded-[14px] px-3 py-2 text-sm ${state.examPart === "reading" ? "bg-amber-200/18 text-white" : "text-slate-200"}">Reading</button>
            <button data-action="switch-exam-part" data-part="writing" class="flex-1 rounded-[14px] px-3 py-2 text-sm ${state.examPart === "writing" ? "bg-amber-200/18 text-white" : "text-slate-200"}">Writing</button>
            <button data-action="switch-exam-part" data-part="speaking" class="flex-1 rounded-[14px] px-3 py-2 text-sm ${state.examPart === "speaking" ? "bg-amber-200/18 text-white" : "text-slate-200"}">Speaking</button>
          </div>

          <div class="mt-4">
            ${state.examPart === "reading" ? renderExamReading() : state.examPart === "writing" ? renderExamWriting() : renderExamSpeaking()}
          </div>
        </section>
      `;
    }

    function renderAICoach() {
      const prompts = CROWN_DATABASE.aiCoach.promptStarters;
      return `
        <section class="royal-card rounded-[30px] p-4 shadow-royal view-fast">
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="text-[10px] uppercase tracking-[0.30em] text-amber-100/70">Unlimited AI Coach</div>
              <h3 class="mt-2 font-display text-2xl text-white">Cheksiz kontekstual yordam</h3>
            </div>
            <div class="rounded-full border border-emerald-300/20 bg-emerald-400/10 px-3 py-1 text-xs text-emerald-100">Unlimited</div>
          </div>

          <div class="chips-scroll mt-4 flex gap-2 overflow-x-auto pb-1">
            ${prompts.map((prompt) => `
              <button data-action="ai-prompt" data-prompt="${escapeHtml(prompt)}" class="rounded-full border border-amber-300/14 bg-amber-200/10 px-3 py-2 text-xs text-amber-100">
                ${escapeHtml(prompt)}
              </button>
            `).join("")}
          </div>

          <div class="scroll-slim mt-4 max-h-[42vh] space-y-3 overflow-y-auto pr-1">
            ${state.aiMessages.map((msg) => `
              <div class="${msg.role === "user" ? "ml-8 border-amber-300/16 bg-amber-200/10" : "mr-8 border-white/8 bg-white/5"} rounded-[20px] border p-3">
                <div class="text-[10px] uppercase tracking-[0.24em] ${msg.role === "user" ? "text-amber-100/72" : "text-slate-300/75"}">${msg.role === "user" ? "Siz" : "Crown AI"}</div>
                <div class="mt-2 text-sm leading-6 text-white">${escapeHtml(msg.text)}</div>
              </div>
            `).join("")}
          </div>

          <div class="mt-4 rounded-[20px] border border-white/8 bg-white/5 p-3">
            <textarea id="aiInput" class="h-24 w-full resize-none bg-transparent text-sm leading-6 text-white outline-none placeholder:text-slate-400/70" placeholder="Savolingizni yozing: grammar, exam, speaking, strategy...">${escapeHtml(state.aiDraft)}</textarea>
            <div class="mt-3 flex gap-3">
              <button data-action="send-ai" class="flex-1 rounded-[16px] shimmer-gold animate-shimmer px-4 py-3 text-sm font-semibold text-black">Yuborish</button>
              <button data-action="clear-ai" class="flex-1 rounded-[16px] border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Tozalash</button>
            </div>
          </div>
        </section>
      `;
    }

    function renderProgressTracker() {
      const mastery = computeMastery();
      const skill = computeSkillScores();
      const avgExam = state.progress.totalExamQuestions
        ? Math.round((state.progress.totalExamScore / state.progress.totalExamQuestions) * 100)
        : 0;
      const weekly = CROWN_DATABASE.progressBlueprint.weeklyHours.map((item, idx) => {
        const plus = Math.min(4, Math.floor(state.progress.lessonCompletions / 3));
        return item + plus + (idx === 6 ? Math.min(3, state.progress.examAttempts) : 0);
      });
      const maxWeekly = Math.max(...weekly, 1);

      return `
        <section class="royal-card rounded-[30px] p-4 shadow-royal view-fast">
          <div class="text-[10px] uppercase tracking-[0.30em] text-amber-100/70">Smart Progress Tracker</div>
          <h3 class="mt-2 font-display text-2xl text-white">Murakkab statistik tahlil</h3>
          <p class="mt-2 text-sm leading-6 text-slate-300/78">Bu bo'lim sizning o'zlashtirish darajangiz, skill kesimi va haftalik trendlaringizni Crown-level vizual orqali ko'rsatadi.</p>

          <div class="mt-4 grid grid-cols-2 gap-3">
            <div class="rounded-[22px] border border-amber-300/14 bg-amber-200/10 p-4">
              <div class="text-[10px] uppercase tracking-[0.24em] text-amber-100/72">Overall Mastery</div>
              <div class="mt-3 flex items-center justify-between gap-3">
                <div class="font-display text-4xl text-white">${mastery}%</div>
                <div class="h-[84px] w-[84px] rounded-full border border-amber-300/30 grid place-items-center" style="background: conic-gradient(#d4af37 ${Math.round((mastery / 100) * 360)}deg, rgba(255,255,255,0.08) 0deg);">
                  <div class="h-[58px] w-[58px] rounded-full bg-[#080808] grid place-items-center text-xs text-amber-100">Crown</div>
                </div>
              </div>
            </div>
            <div class="rounded-[22px] border border-amber-300/14 bg-white/5 p-4">
              <div class="text-[10px] uppercase tracking-[0.24em] text-amber-100/72">Core Metrics</div>
              <div class="mt-3 space-y-2 text-sm text-white">
                <div class="flex justify-between"><span>Lesson completions</span><span>${state.progress.lessonCompletions}</span></div>
                <div class="flex justify-between"><span>Exam attempts</span><span>${state.progress.examAttempts}</span></div>
                <div class="flex justify-between"><span>AI coaching sessions</span><span>${state.progress.aiSessions}</span></div>
                <div class="flex justify-between"><span>Daily streak</span><span>${state.progress.streak} kun</span></div>
                <div class="flex justify-between"><span>Exam accuracy</span><span>${avgExam}%</span></div>
              </div>
            </div>
          </div>

          <div class="mt-4 rounded-[22px] border border-white/8 bg-white/5 p-4">
            <div class="text-[10px] uppercase tracking-[0.24em] text-amber-100/72">Skill Intelligence Bars</div>
            <div class="mt-3 space-y-3">
              ${Object.entries(skill).map(([name, score]) => `
                <div>
                  <div class="flex items-center justify-between gap-3 text-sm text-white">
                    <span>${escapeHtml(name)}</span>
                    <span>${score}%</span>
                  </div>
                  <div class="mt-2 h-2.5 overflow-hidden rounded-full bg-white/8">
                    <div class="spark-bar animate-flowBar h-full rounded-full" style="width:${score}%"></div>
                  </div>
                </div>
              `).join("")}
            </div>
          </div>

          <div class="mt-4 rounded-[22px] border border-white/8 bg-white/5 p-4">
            <div class="text-[10px] uppercase tracking-[0.24em] text-amber-100/72">Weekly Crown Activity</div>
            <div class="mt-4 flex h-[140px] items-end justify-between gap-2">
              ${weekly.map((value, idx) => `
                <div class="flex-1 text-center">
                  <div class="mx-auto w-full max-w-[28px] rounded-t-[10px] spark-bar animate-flowBar" style="height:${Math.max(18, Math.round((value / maxWeekly) * 120))}px"></div>
                  <div class="mt-2 text-[10px] text-slate-300/72">K${idx + 1}</div>
                </div>
              `).join("")}
            </div>
          </div>
        </section>
      `;
    }

    function renderToast() {
      if (!state.toast) return "";
      return `<div class="royal-card rounded-[20px] px-4 py-3 text-sm text-white view-fast">${escapeHtml(state.toast)}</div>`;
    }

    function renderMainSection() {
      if (state.section === "academic") return renderAcademic();
      if (state.section === "exam") return renderExamCenter();
      if (state.section === "ai") return renderAICoach();
      if (state.section === "progress") return renderProgressTracker();
      return renderHub();
    }

    function render() {
      syncTelegram();
      app.innerHTML = `
        <main class="relative z-10 mx-auto flex min-h-screen w-full max-w-[450px] flex-col gap-4 px-4 pb-[calc(var(--safe-bottom)+22px)] pt-[calc(var(--safe-top)+14px)]">
          ${renderHeader()}
          ${renderLimits()}
          ${renderQuickNav()}
          ${renderMainSection()}
          ${renderToast()}
        </main>
      `;

      const searchInput = document.getElementById("searchInput");
      if (searchInput) {
        searchInput.addEventListener("input", (event) => {
          state.search = event.target.value;
          render();
        });
      }

      const aiInput = document.getElementById("aiInput");
      if (aiInput) {
        aiInput.addEventListener("input", (event) => {
          state.aiDraft = event.target.value;
        });
      }
    }

    app.addEventListener("click", (event) => {
      const actionTarget = event.target.closest("[data-action]");
      if (!actionTarget) return;
      const action = actionTarget.dataset.action;

      if (action === "switch-section") {
        const section = actionTarget.dataset.section;
        setState({ section, toast: "" });
        return;
      }

      if (action === "select-level") {
        const levelId = actionTarget.dataset.levelId;
        setState({
          levelId,
          search: "",
          selectedLessonId: null,
          toast: "",
        });
        return;
      }

      if (action === "open-lesson") {
        openLesson(actionTarget.dataset.lessonId);
        return;
      }

      if (action === "close-lesson") {
        closeLessonDetail();
        return;
      }

      if (action === "switch-lesson-tab") {
        setState({ lessonTab: actionTarget.dataset.tab, toast: "" });
        return;
      }

      if (action === "download-pdf") {
        setState({ toast: `${actionTarget.dataset.name} uchun premium yuklab olish vizual tugmasi bosildi.` });
        return;
      }

      if (action === "start-lesson-quiz") {
        setState({
          lessonQuizStarted: true,
          lessonQuizIndex: 0,
          lessonSelectedOption: null,
          lessonReorderAnswer: [],
          lessonAnswers: [],
          lessonQuizFinished: false,
          lessonQuizResult: null,
          toast: "",
        });
        return;
      }

      if (action === "restart-lesson-quiz") {
        setState({
          lessonQuizStarted: true,
          lessonQuizIndex: 0,
          lessonSelectedOption: null,
          lessonReorderAnswer: [],
          lessonAnswers: [],
          lessonQuizFinished: false,
          lessonQuizResult: null,
          toast: "",
        });
        return;
      }

      if (action === "pick-lesson-option") {
        setState({ lessonSelectedOption: Number(actionTarget.dataset.optionIndex), toast: "" });
        return;
      }

      if (action === "add-lesson-token") {
        if (actionTarget.dataset.disabled === "true") return;
        setState({
          lessonReorderAnswer: [...state.lessonReorderAnswer, actionTarget.textContent.trim()],
          toast: "",
        });
        return;
      }

      if (action === "remove-lesson-token") {
        setState({
          lessonReorderAnswer: state.lessonReorderAnswer.slice(0, -1),
          toast: "",
        });
        return;
      }

      if (action === "clear-lesson-reorder") {
        setState({ lessonReorderAnswer: [], toast: "" });
        return;
      }

      if (action === "next-lesson-question") {
        const lesson = currentLesson();
        const question = currentLessonQuestion();
        const ready = question.type === "mcq"
          ? state.lessonSelectedOption !== null
          : state.lessonReorderAnswer.length === question.answer.length;
        if (!ready) return;

        const answer = question.type === "mcq" ? state.lessonSelectedOption : [...state.lessonReorderAnswer];
        const nextAnswers = [...state.lessonAnswers];
        nextAnswers[state.lessonQuizIndex] = answer;

        if (state.lessonQuizIndex === lesson.quiz.length - 1) {
          state.lessonAnswers = nextAnswers;
          finishLessonQuiz();
          return;
        }

        setState({
          lessonAnswers: nextAnswers,
          lessonQuizIndex: state.lessonQuizIndex + 1,
          lessonSelectedOption: null,
          lessonReorderAnswer: [],
          toast: "",
        });
        return;
      }

      if (action === "switch-exam-track") {
        const track = actionTarget.dataset.track;
        resetExamReading();
        setState({ examTrack: track, examPart: "reading", toast: "" });
        return;
      }

      if (action === "switch-exam-part") {
        setState({ examPart: actionTarget.dataset.part, toast: "" });
        return;
      }

      if (action === "pick-exam-option") {
        const nextAnswers = [...state.examAnswers];
        nextAnswers[state.examIndex] = Number(actionTarget.dataset.optionIndex);
        const reading = currentExamTrackData().reading;
        if (state.examIndex === reading.questions.length - 1) {
          state.examAnswers = nextAnswers;
          finishExamReading();
          return;
        }
        setState({
          examAnswers: nextAnswers,
          examIndex: state.examIndex + 1,
          toast: "",
        });
        return;
      }

      if (action === "restart-exam-reading") {
        resetExamReading();
        setState({ toast: "" });
        return;
      }

      if (action === "submit-writing-practice") {
        recordProgress({
          examAttempts: state.progress.examAttempts + 1,
          masteryBoost: state.progress.masteryBoost + 1,
        });
        sendToBot(
          {
            type: "premium_exam_writing_practice",
            track: state.examTrack,
            date: TODAY,
          },
          "Writing practice yakunlangani botga yuborildi."
        );
        render();
        return;
      }

      if (action === "submit-speaking-practice") {
        recordProgress({
          examAttempts: state.progress.examAttempts + 1,
          masteryBoost: state.progress.masteryBoost + 1,
        });
        sendToBot(
          {
            type: "premium_exam_speaking_practice",
            track: state.examTrack,
            date: TODAY,
          },
          "Speaking practice yakunlangani botga yuborildi."
        );
        render();
        return;
      }

      if (action === "ai-prompt") {
        sendAICoachMessage(actionTarget.dataset.prompt || "");
        return;
      }

      if (action === "send-ai") {
        sendAICoachMessage(state.aiDraft);
        return;
      }

      if (action === "clear-ai") {
        setState({
          aiDraft: "",
          aiMessages: [{ role: "assistant", text: CROWN_DATABASE.aiCoach.greeting }],
          toast: "AI chat yangilandi.",
        });
      }
    });

    document.addEventListener(
      "click",
      (event) => {
        if (event.target.closest("button")) {
          hapticImpact("light");
        }
      },
      true
    );

    render();
  </script>
</body>
</html>
