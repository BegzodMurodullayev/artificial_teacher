version: "3.9"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: artificial-teacher-bot
    env_file:
      - .env
    environment:
      - DB_PATH=/var/data/engbot.db
    volumes:
      - bot_data:/var/data
    restart: unless-stopped

volumes:
  bot_data:
