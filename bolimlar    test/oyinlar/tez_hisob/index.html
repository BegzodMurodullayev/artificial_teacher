<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BilimBox — Tez Hisob</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    font-family: 'Segoe UI', sans-serif; background: #0a0a1a; user-select: none;
    transform-origin: top left;
    position: relative;
  }
  .bg {
    position: fixed; inset: 0;
    background-image: url('../../../ui/assets/bg_kirish.jpg');
    background-size: cover; background-position: center;
    filter: brightness(0.4); z-index: 0;
  }
  .overlay {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(34,197,94,0.15) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 30%, rgba(59,130,246,0.15) 0%, transparent 55%);
    z-index: 1;
  }
  .titlebar {
    position: fixed; top: 0; left: 0; right: 0; height: 40px;
    -webkit-app-region: drag; z-index: 100;
    display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
  }
  .titlebar-left { display: flex; align-items: center; gap: 12px; -webkit-app-region: no-drag; }
  .back-btn {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    color: rgba(180,200,255,0.8); padding: 4px 12px; border-radius: 8px;
    cursor: pointer; font-size: 12px; transition: all 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .app-name {
    font-size: 15px; font-weight: 700;
    background: linear-gradient(135deg, #4ade80, #60a5fa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .titlebar-right { display: flex; align-items: center; gap: 8px; -webkit-app-region: no-drag; }
  .titlebar button { width: 14px; height: 14px; border-radius: 50%; border: none; cursor: pointer; transition: opacity 0.2s, transform 0.2s; }
  .titlebar button:hover { opacity: 0.85; transform: scale(1.15); }
  .btn-close { background: #ff5f57; } .btn-min { background: #febc2e; } .btn-max { background: #78c3ff; }
  .btn-max   { background: #78c3ff; }
  .header-line {
    position: fixed; top: 40px; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(100,255,150,0.3), transparent); z-index: 99;
  }
  .particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
  .dot {
    position: absolute; border-radius: 50%; background: rgba(255,255,255,0.6);
    animation: twinkle var(--d,3s) ease-in-out infinite; animation-delay: var(--delay,0s);
  }
  @keyframes twinkle { 0%,100%{opacity:0.1;transform:scale(1)} 50%{opacity:0.7;transform:scale(1.3)} }

  /* Ekranlar */
  .screen {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 10;
    transition: opacity 0.4s, transform 0.4s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.97); }

  .card {
    background: rgba(10,15,40,0.65); backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 28px; padding: 36px 48px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    text-align: center; min-width: 600px;
  }

  .sarlavha { font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 6px; }
  .sub { font-size: 13px; color: rgba(180,200,255,0.6); margin-bottom: 28px; letter-spacing: 0.5px; }
  .label {
    font-size: 11px; color: rgba(180,200,255,0.5); letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 12px; text-align: left;
  }
  .bolim { margin-bottom: 24px; }

  /* Amallar toggle tugmalari */
  .amallar-grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .amal-btn {
    padding: 10px 20px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: rgba(200,220,255,0.7); font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
  }
  .amal-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .amal-btn.tanlandi {
    background: rgba(74,222,128,0.2); border-color: #4ade80;
    color: #4ade80; box-shadow: 0 0 12px rgba(74,222,128,0.2);
  }
  .amal-btn .chek { font-size: 16px; }

  /* Daraja tugmalari */
  .daraja-grid { display: flex; gap: 12px; }
  .daraja-btn {
    flex: 1; padding: 12px 10px; border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    position: relative; overflow: hidden;
  }
  .daraja-btn::before {
    content: ''; position: absolute; top: 0; left: 15%; right: 15%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--e), transparent); opacity: 0.8;
  }
  .daraja-btn.tanlandi {
    background: rgba(255,255,255,0.12); border-color: var(--e);
    box-shadow: 0 0 16px var(--g);
  }
  .daraja-btn:hover { transform: translateY(-4px); background: rgba(255,255,255,0.1); }
  .daraja-btn .d-icon { font-size: 22px; }
  .daraja-btn .d-nom { font-size: 13px; font-weight: 700; color: #fff; }
  .daraja-btn .d-vaqt { font-size: 11px; color: rgba(200,220,255,0.5); }

  /* Savol soni */
  .savol-grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .savol-btn {
    width: 64px; height: 48px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    color: rgba(200,220,255,0.7); font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .savol-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .savol-btn.tanlandi {
    background: rgba(96,165,250,0.2); border-color: #60a5fa;
    color: #60a5fa; box-shadow: 0 0 12px rgba(96,165,250,0.2);
  }

  /* Boshlash tugmasi */
  .boshlash-btn {
    width: 100%; padding: 15px; border-radius: 16px; border: none;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 20px rgba(34,197,94,0.4);
    transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    margin-top: 8px;
  }
  .boshlash-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(34,197,94,0.5); }
  .boshlash-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ══ O'YIN EKRANI ══ */
  .oyun-card {
    background: rgba(10,15,40,0.65); backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 28px; padding: 32px 48px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    min-width: 580px; text-align: center;
  }

  /* Yuqori info */
  .oyun-topbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
  }
  .o-chip {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; padding: 6px 14px; font-size: 13px; color: rgba(200,220,255,0.8);
  }
  .o-chip strong { color: #fff; }

  /* Timer doira */
  .timer-wrap {
    position: relative; width: 70px; height: 70px; margin: 0 auto 20px;
  }
  .timer-svg { transform: rotate(-90deg); }
  .timer-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 5; }
  .timer-fill { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
  .timer-num {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 800; color: #fff;
  }

  /* Misol */
  .misol-box {
    font-size: 42px; font-weight: 900; color: #fff;
    margin-bottom: 8px; letter-spacing: 2px;
    text-shadow: 0 0 30px rgba(96,165,250,0.4);
    animation: misOlPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes misOlPop { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }

  .javob-wrap { display: flex; gap: 12px; justify-content: center; margin-bottom: 16px; }
  input[type="number"] {
    width: 160px; padding: 13px 18px; border-radius: 14px;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
    color: #fff; font-size: 22px; font-weight: 700; outline: none; text-align: center;
    transition: all 0.3s; font-family: 'Segoe UI', sans-serif;
  }
  input[type="number"]:focus {
    border-color: rgba(96,165,250,0.6); background: rgba(255,255,255,0.1);
    box-shadow: 0 0 0 3px rgba(96,165,250,0.15);
  }
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  .javob-btn {
    padding: 13px 28px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, #3b82f6, #7c3aed);
    color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 20px rgba(59,130,246,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .javob-btn:hover { transform: translateY(-2px); }

  /* Xabar */
  .natija-xabar {
    height: 30px; font-size: 16px; font-weight: 700;
    transition: all 0.3s; margin-bottom: 8px;
  }
  .natija-xabar.togri { color: #4ade80; animation: flash 0.3s; }
  .natija-xabar.xato { color: #f87171; animation: shake 0.3s; }
  @keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

  /* Progress */
  .progress-wrap { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }
  .p-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(255,255,255,0.15); transition: all 0.3s;
  }
  .p-dot.togri { background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,0.5); }
  .p-dot.xato { background: #f87171; box-shadow: 0 0 6px rgba(248,113,113,0.5); }

  /* Natija ekrani */
  .natija-card {
    background: rgba(10,15,40,0.9); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 28px; padding: 44px 56px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    animation: bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
    min-width: 480px;
  }
  @keyframes bounceIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
  .n-emoji { font-size: 60px; margin-bottom: 14px; }
  .n-h { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 8px; }
  .n-sub { font-size: 14px; color: rgba(180,210,255,0.7); margin-bottom: 24px; }
  .n-stats {
    display: flex; gap: 16px; justify-content: center; margin-bottom: 24px;
  }
  .n-stat {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 12px 20px; text-align: center;
  }
  .n-stat .val { font-size: 28px; font-weight: 800; color: #fff; }
  .n-stat .nom { font-size: 11px; color: rgba(180,200,255,0.6); margin-top: 2px; }
  .n-btn {
    padding: 12px 32px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, #3b82f6, #7c3aed);
    color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; margin: 0 6px;
    transition: transform 0.2s;
  }
  .n-btn:hover { transform: translateY(-2px); }
  .n-btn.grey { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); }
</style>
</head>
<body>
<div class="bg"></div>
<div class="overlay"></div>
<div class="particles" id="particles"></div>

<div class="titlebar">
  <div class="titlebar-left">
    <button class="back-btn" onclick="orqaga()">← Orqaga</button>
    <span class="app-name">✦ BilimBox — Tez Hisob</span>
  </div>
  <div class="titlebar-right">
    <button class="btn-min" onclick="ipcRenderer.invoke('minimize-app')"></button>
    <button class="btn-max" onclick="ipcRenderer.invoke('toggle-maximize-app')"></button>
    <button class="btn-close" onclick="ipcRenderer.invoke('close-app')"></button>
  </div>
</div>
<div class="header-line"></div>

<!-- ══ EKRAN 1: SOZLASH ══ -->
<div class="screen" id="screen-sozlash">
  <div class="card">
    <div class="sarlavha">⚡ Tez Hisob</div>
    <div class="sub">O'yin sozlamalarini tanlang</div>

    <!-- Amallar -->
    <div class="bolim">
      <div class="label">Amallarni tanlang (bir yoki bir nechta)</div>
      <div class="amallar-grid">
        <button class="amal-btn" id="amal-qoshish" onclick="amalToggle('qoshish')">
          <span class="chek">☐</span> ➕ Qo'shish
        </button>
        <button class="amal-btn" id="amal-ayirish" onclick="amalToggle('ayirish')">
          <span class="chek">☐</span> ➖ Ayirish
        </button>
        <button class="amal-btn" id="amal-kopaytirish" onclick="amalToggle('kopaytirish')">
          <span class="chek">☐</span> ✖️ Ko'paytirish
        </button>
        <button class="amal-btn" id="amal-bolish" onclick="amalToggle('bolish')">
          <span class="chek">☐</span> ➗ Bo'lish
        </button>
      </div>
    </div>

    <!-- Daraja -->
    <div class="bolim">
      <div class="label">Daraja</div>
      <div class="daraja-grid">
        <button class="daraja-btn" id="daraja-oson" style="--e:#22c55e;--g:rgba(34,197,94,0.3)" onclick="darajaTanla('oson')">
          <span class="d-icon">🟢</span>
          <span class="d-nom">Oson</span>
          <span class="d-vaqt">⏱ 60 soniya</span>
        </button>
        <button class="daraja-btn" id="daraja-orta" style="--e:#fbbf24;--g:rgba(251,191,36,0.3)" onclick="darajaTanla('orta')">
          <span class="d-icon">🟡</span>
          <span class="d-nom">O'rta</span>
          <span class="d-vaqt">⏱ 50 soniya</span>
        </button>
        <button class="daraja-btn" id="daraja-qiyin" style="--e:#ef4444;--g:rgba(239,68,68,0.3)" onclick="darajaTanla('qiyin')">
          <span class="d-icon">🔴</span>
          <span class="d-nom">Qiyin</span>
          <span class="d-vaqt">⏱ 40 soniya</span>
        </button>
      </div>
    </div>

    <!-- Savol soni -->
    <div class="bolim">
      <div class="label">Nechta savol?</div>
      <div class="savol-grid">
        <button class="savol-btn" onclick="savolTanla(5)">5</button>
        <button class="savol-btn" onclick="savolTanla(10)">10</button>
        <button class="savol-btn" onclick="savolTanla(15)">15</button>
        <button class="savol-btn" onclick="savolTanla(20)">20</button>
        <button class="savol-btn" onclick="savolTanla(30)">30</button>
        <button class="savol-btn" onclick="savolTanla(50)">50</button>
      </div>
    </div>

    <button class="boshlash-btn" id="boshlash-btn" disabled onclick="oyinBoshlash()">
      ▶ Boshlash
    </button>
  </div>
</div>

<!-- ══ EKRAN 2: O'YIN ══ -->
<div class="screen hidden" id="screen-oyun">
  <div class="oyun-card">
    <!-- Topbar -->
    <div class="oyun-topbar">
      <div class="o-chip">Ball: <strong id="ball">0</strong></div>
      <div class="o-chip">Savol: <strong id="joriy-savol">1</strong> / <strong id="jami-savol">10</strong></div>
      <div class="o-chip">✅ <strong id="togri-son">0</strong> &nbsp; ❌ <strong id="xato-son">0</strong></div>
    </div>

    <!-- Timer -->
    <div class="timer-wrap">
      <svg class="timer-svg" width="70" height="70" viewBox="0 0 70 70">
        <circle class="timer-bg" cx="35" cy="35" r="30"/>
        <circle class="timer-fill" id="timer-fill" cx="35" cy="35" r="30"
          stroke="#4ade80"
          stroke-dasharray="188.5"
          stroke-dashoffset="0"/>
      </svg>
      <div class="timer-num" id="timer-num">15</div>
    </div>

    <!-- Misol -->
    <div class="misol-box" id="misol-box">2 + 3 = ?</div>

    <!-- Xabar -->
    <div class="natija-xabar" id="natija-xabar"></div>

    <!-- Javob -->
    <div class="javob-wrap">
      <input type="number" id="javob-input" placeholder="?" autofocus />
      <button class="javob-btn" onclick="javobTekshir()">✓</button>
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progress-wrap"></div>
  </div>
</div>

<!-- ══ EKRAN 3: NATIJA ══ -->
<div class="screen hidden" id="screen-natija">
  <div class="natija-card">
    <div class="n-emoji" id="n-emoji">🏆</div>
    <div class="n-h" id="n-h">Zo'r!</div>
    <div class="n-sub" id="n-sub">O'yin tugadi</div>
    <div class="n-stats">
      <div class="n-stat">
        <div class="val" id="n-ball">0</div>
        <div class="nom">Ball</div>
      </div>
      <div class="n-stat">
        <div class="val" id="n-togri">0</div>
        <div class="nom">To'g'ri</div>
      </div>
      <div class="n-stat">
        <div class="val" id="n-xato">0</div>
        <div class="nom">Xato</div>
      </div>
      <div class="n-stat">
        <div class="val" id="n-foiz">0%</div>
        <div class="nom">Aniqlik</div>
      </div>
    </div>
    <button class="n-btn" onclick="qaytaBoshlash()">🔄 Qayta</button>
    <button class="n-btn grey" onclick="orqaga()">← Menyuga</button>
  </div>
</div>

<script>
const { ipcRenderer } = require('electron');

// ── HOLAT ──────────────────────────────────────────
let tanlangAmallar = new Set();
let tanlangDaraja = null;
let tanlangSavolSon = null;
let joriyIndex = 0;
let ball = 0, togriSon = 0, xatoSon = 0;
let timerInterval = null;
let qolganVaqt = 15;
let vaqtlar = { oson: 60, orta: 50, qiyin: 40 };
let joriyJavob = 0;
let progressDots = [];

// ── EKRANLAR ──────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ── AMAL TOGGLE ───────────────────────────────────
function amalToggle(amal) {
  if (tanlangAmallar.has(amal)) {
    tanlangAmallar.delete(amal);
    document.getElementById('amal-' + amal).classList.remove('tanlandi');
    document.getElementById('amal-' + amal).querySelector('.chek').textContent = '☐';
  } else {
    tanlangAmallar.add(amal);
    document.getElementById('amal-' + amal).classList.add('tanlandi');
    document.getElementById('amal-' + amal).querySelector('.chek').textContent = '☑';
  }
  tekshirBoshlash();
}

// ── DARAJA ─────────────────────────────────────────
function darajaTanla(d) {
  tanlangDaraja = d;
  document.querySelectorAll('.daraja-btn').forEach(b => b.classList.remove('tanlandi'));
  document.getElementById('daraja-' + d).classList.add('tanlandi');
  tekshirBoshlash();
}

// ── SAVOL SONI ────────────────────────────────────
function savolTanla(n) {
  tanlangSavolSon = n;
  document.querySelectorAll('.savol-btn').forEach(b => {
    b.classList.toggle('tanlandi', parseInt(b.textContent) === n);
  });
  tekshirBoshlash();
}

// ── BOSHLASH TEKSHIRUVI ───────────────────────────
function tekshirBoshlash() {
  const ok = tanlangAmallar.size > 0 && tanlangDaraja && tanlangSavolSon;
  document.getElementById('boshlash-btn').disabled = !ok;
  document.getElementById('boshlash-btn').textContent = ok
    ? `▶ Boshlash (${tanlangSavolSon} ta savol)`
    : '▶ Boshlash';
}

// ── MISOL GENERATSIYA ─────────────────────────────
function misolYasat() {
  const amallar = [...tanlangAmallar];
  const amal = amallar[Math.floor(Math.random() * amallar.length)];

  let a, b, javob, belgi;
  const max = tanlangDaraja === 'oson' ? 10 : tanlangDaraja === 'orta' ? 50 : 100;

  if (amal === 'qoshish') {
    a = Math.floor(Math.random() * max) + 1;
    b = Math.floor(Math.random() * max) + 1;
    javob = a + b; belgi = '+';
  } else if (amal === 'ayirish') {
    a = Math.floor(Math.random() * max) + 1;
    b = Math.floor(Math.random() * a) + 1;
    javob = a - b; belgi = '−';
  } else if (amal === 'kopaytirish') {
    const maxK = tanlangDaraja === 'oson' ? 5 : tanlangDaraja === 'orta' ? 10 : 15;
    a = Math.floor(Math.random() * maxK) + 1;
    b = Math.floor(Math.random() * maxK) + 1;
    javob = a * b; belgi = '×';
  } else {
    b = Math.floor(Math.random() * (tanlangDaraja === 'oson' ? 5 : 10)) + 1;
    javob = Math.floor(Math.random() * (tanlangDaraja === 'oson' ? 10 : 20)) + 1;
    a = b * javob; belgi = '÷';
  }

  return { matn: `${a}  ${belgi}  ${b}  =  ?`, javob };
}

// ── O'YIN BOSHLASH ────────────────────────────────
function oyinBoshlash() {
  joriyIndex = 0; ball = 0; togriSon = 0; xatoSon = 0;
  progressDots = [];

  document.getElementById('jami-savol').textContent = tanlangSavolSon;
  document.getElementById('ball').textContent = 0;
  document.getElementById('togri-son').textContent = 0;
  document.getElementById('xato-son').textContent = 0;

  // Progress dotlar
  const pw = document.getElementById('progress-wrap');
  pw.innerHTML = '';
  for (let i = 0; i < tanlangSavolSon; i++) {
    const d = document.createElement('div');
    d.className = 'p-dot'; pw.appendChild(d);
    progressDots.push(d);
  }

  showScreen('screen-oyun');
  keyingSavol();
}

// ── KEYINGI SAVOL ─────────────────────────────────
function keyingSavol() {
  if (joriyIndex >= tanlangSavolSon) { natijaKo(); return; }

  const { matn, javob } = misolYasat();
  joriyJavob = javob;

  document.getElementById('misol-box').textContent = matn;
  document.getElementById('joriy-savol').textContent = joriyIndex + 1;
  document.getElementById('natija-xabar').textContent = '';
  document.getElementById('natija-xabar').className = 'natija-xabar';
  document.getElementById('javob-input').value = '';

  timerBoshlash();
  setTimeout(() => document.getElementById('javob-input').focus(), 100);
}

// ── TIMER ─────────────────────────────────────────
function timerBoshlash() {
  stopTimer();
  qolganVaqt = vaqtlar[tanlangDaraja];
  const jami = qolganVaqt;
  const fill = document.getElementById('timer-fill');
  const num = document.getElementById('timer-num');
  const radius = 30;
  const circumference = 2 * Math.PI * radius;

  fill.style.strokeDashoffset = 0;
  fill.style.stroke = '#4ade80';
  num.textContent = qolganVaqt;

  timerInterval = setInterval(() => {
    qolganVaqt--;
    num.textContent = qolganVaqt;
    const offset = circumference * (1 - qolganVaqt / jami);
    fill.style.strokeDashoffset = offset;

    if (qolganVaqt <= 3) fill.style.stroke = '#ef4444';
    else if (qolganVaqt <= Math.floor(jami / 2)) fill.style.stroke = '#fbbf24';

    if (qolganVaqt <= 0) {
      stopTimer();
      vaqtOtdi();
    }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

// ── JAVOB TEKSHIRISH ──────────────────────────────
function javobTekshir() {
  const val = parseInt(document.getElementById('javob-input').value);
  if (isNaN(val)) return;
  stopTimer();

  const xabar = document.getElementById('natija-xabar');
  const dot = progressDots[joriyIndex];

  if (val === joriyJavob) {
    togriSon++;
    const ballQoshish = tanlangDaraja === 'oson' ? 10 : tanlangDaraja === 'orta' ? 20 : 30;
    ball += ballQoshish + Math.ceil(qolganVaqt * 2);
    xabar.textContent = '✅ To\'g\'ri!';
    xabar.className = 'natija-xabar togri';
    dot.classList.add('togri');
    document.getElementById('togri-son').textContent = togriSon;
  } else {
    xatoSon++;
    xabar.textContent = `❌ Xato! To'g'ri javob: ${joriyJavob}`;
    xabar.className = 'natija-xabar xato';
    dot.classList.add('xato');
    document.getElementById('xato-son').textContent = xatoSon;
  }

  document.getElementById('ball').textContent = ball;
  joriyIndex++;

  setTimeout(() => keyingSavol(), 900);
}

function vaqtOtdi() {
  const xabar = document.getElementById('natija-xabar');
  xabar.textContent = `⏱ Vaqt tugadi! Javob: ${joriyJavob}`;
  xabar.className = 'natija-xabar xato';
  const dot = progressDots[joriyIndex];
  if (dot) dot.classList.add('xato');
  xatoSon++;
  document.getElementById('xato-son').textContent = xatoSon;
  joriyIndex++;
  setTimeout(() => keyingSavol(), 900);
}

// ── NATIJA ────────────────────────────────────────
function natijaKo() {
  stopTimer();
  const foiz = Math.round((togriSon / tanlangSavolSon) * 100);

  document.getElementById('n-ball').textContent = ball;
  document.getElementById('n-togri').textContent = togriSon;
  document.getElementById('n-xato').textContent = xatoSon;
  document.getElementById('n-foiz').textContent = foiz + '%';

  let emoji, h, sub;
  if (foiz >= 90) { emoji = '🏆'; h = 'Ajoyib!'; sub = 'Siz matematika dahosisiz!'; }
  else if (foiz >= 70) { emoji = '🎉'; h = 'Zo\'r!'; sub = 'Juda yaxshi natija!'; }
  else if (foiz >= 50) { emoji = '👍'; h = 'Yaxshi!'; sub = 'Yana mashq qiling!'; }
  else { emoji = '💪'; h = 'Kuchliroq urining!'; sub = 'Mashq qilsangiz yaxshilanasiz!'; }

  document.getElementById('n-emoji').textContent = emoji;
  document.getElementById('n-h').textContent = h;
  document.getElementById('n-sub').textContent = sub + ` (${foiz}% aniqlik)`;

  showScreen('screen-natija');
}

function qaytaBoshlash() { showScreen('screen-sozlash'); }
function orqaga() { stopTimer(); ipcRenderer.invoke('goto', 'oyinlar'); }

// Enter
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const s = document.querySelector('.screen:not(.hidden)');
    if (s && s.id === 'screen-oyun') javobTekshir();
  }
});

// Yulduzlar
const container = document.getElementById('particles');
for (let i = 0; i < 50; i++) {
  const dot = document.createElement('div');
  dot.className = 'dot';
  const size = Math.random() * 2.5 + 0.5;
  dot.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;opacity:${Math.random()*0.5};`;
  container.appendChild(dot);
}

function fitWindow() {
  const scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
  document.body.style.transform = `scale(${scale})`;
  document.body.style.marginLeft = `${Math.max(0, (window.innerWidth - 1280 * scale) / 2)}px`;
  document.body.style.marginTop = `${Math.max(0, (window.innerHeight - 720 * scale) / 2)}px`;
}
window.addEventListener('resize', fitWindow);
fitWindow();

</script>
