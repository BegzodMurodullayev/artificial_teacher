<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Artificial Teacher - Service</title>
  <style>
    :root { --bg:#0b1220; --card:#111827; --muted:#9ca3af; --accent:#60a5fa; --border:#1f2937; }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:#e5e7eb;padding:24px}
    .card{max-width:840px;margin:0 auto;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
    h1{margin:0 0 8px;font-size:26px}
    p{color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:14px}
    .item{background:#0f172a;border:1px solid var(--border);border-radius:10px;padding:12px}
    code{background:#0f172a;padding:2px 6px;border-radius:6px}
    a{color:var(--accent);text-decoration:none}
    .small{font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="card">
    <h1>Artificial Teacher</h1>
    <p>Bot service ishlayapti. Bu sahifa ping/awake monitoring uchun.</p>

    <div class="grid">
      <div class="item"><b>Jami kirishlar</b><br><span id="total">{{total}}</span></div>
      <div class="item"><b>Oxirgi kirish</b><br><span id="last">{{last_at}}</span></div>
      <div class="item"><b>1 soat</b><br><span id="last1h">{{last_1h}}</span></div>
      <div class="item"><b>24 soat</b><br><span id="last24h">{{last_24h}}</span></div>
    </div>

    <p style="margin-top:14px">Health endpoint: <a href="/health"><code>/health</code></a></p>
    <p>Bot ichida monitoring: <code>/awake</code> (admin/owner)</p>
    <p class="small" id="since">Oxirgi pingdan beri: hisoblanmoqda...</p>
  </div>

  <script>
    const stats = {{stats_json}};
    function toDate(raw){
      if(!raw || raw==='-') return null;
      // SQLite datetime -> ISO
      const iso = raw.replace(' ', 'T') + 'Z';
      const d = new Date(iso);
      return isNaN(d.getTime()) ? null : d;
    }
    function tick(){
      const last = toDate(stats.last_at);
      const el = document.getElementById('since');
      if(!last){ el.textContent = 'Oxirgi pingdan beri: -'; return; }
      const diff = Math.max(0, Date.now() - last.getTime());
      const mins = Math.floor(diff/60000);
      const secs = Math.floor((diff%60000)/1000);
      el.textContent = `Oxirgi pingdan beri: ${mins} daqiqa ${secs} soniya`;
    }
    setInterval(tick, 1000);
    tick();
  </script>
</body>
</html>
